<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <title>英语小助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .nav-link:hover {
            background: white;
            color: #667eea;
        }

        .settings-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .settings-btn:hover {
            background: white;
            color: #667eea;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.4rem;
        }

        .modal label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .modal input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        .modal input[type="text"]:focus {
            border-color: #667eea;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        .modal-actions .btn-cancel {
            padding: 10px 24px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .modal-actions .btn-cancel:hover {
            background: #bdbdbd;
        }

        .modal-actions .btn-save {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .modal-actions .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .modal-hint {
            margin-top: 8px;
            color: #999;
            font-size: 0.85rem;
        }

        .modal-toast {
            display: none;
            padding: 10px 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        .modal-toast.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .modal-toast.error {
            display: block;
            background: #ffebee;
            color: #c62828;
        }

        body {
            position: relative;
        }

        .search-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        #wordInput {
            flex: 1;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
            resize: none;
            min-height: 56px;
            max-height: 200px;
            font-family: inherit;
            line-height: 1.4;
            overflow-y: auto;
        }

        #wordInput:focus {
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .word-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .word {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        .phonetic {
            font-size: 1.2rem;
            color: #667eea;
            font-style: italic;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(102, 126, 234, 0); }
        }

        .example-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }

        .sentence-play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .sentence-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .sentence-play-btn:active {
            transform: scale(0.95);
        }

        .sentence-play-btn.playing {
            animation: pulse 1s infinite;
        }

        .source-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .definition {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .pos {
            display: inline-block;
            padding: 2px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-right: 10px;
        }

        .meaning {
            color: #333;
            font-size: 1.1rem;
        }

        .english-meaning {
            color: #666;
            font-size: 0.95rem;
            margin-top: 5px;
            font-style: italic;
        }

        .phrase-item {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .phrase-item:last-child {
            border-bottom: none;
        }

        .phrase {
            font-weight: 600;
            color: #667eea;
            min-width: 200px;
        }

        .phrase-meaning {
            color: #666;
        }

        .example {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .example-sentence {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .example-source {
            color: #667eea;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .example-translation {
            color: #666;
            font-size: 0.95rem;
        }

        .sentence-original {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            color: #333;
            line-height: 1.6;
            border-left: 4px solid #667eea;
        }

        .sentence-translation {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            color: #333;
            line-height: 1.6;
        }

        .word-link {
            color: #e67e22;
            border-bottom: 1px dashed #e67e22;
            cursor: pointer;
            font-weight: 500;
        }

        .word-link:hover {
            color: #d35400;
            border-bottom-color: #d35400;
        }

        .key-word-item {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .key-word-item:last-child {
            border-bottom: none;
        }

        .key-word {
            font-weight: 600;
            color: #667eea;
            min-width: 150px;
        }

        .key-word-meaning {
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/words" class="nav-link">📖 单词列表</a>
        <a href="/sentences" class="nav-link">📝 句子列表</a>
        <button class="settings-btn" onclick="openSettings()">配置</button>
    </div>

    <!-- 设置模态框 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ 设置</h2>
            <label for="dataDir">数据存储目录</label>
            <input type="text" id="dataDir" placeholder="数据目录路径">
            <p class="modal-hint">💡 默认为项目下的 data 目录，支持绝对路径或相对路径</p>
            <div id="settingsToast" class="modal-toast"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeSettings()">取消</button>
                <button class="btn-save" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>
    <div class="container">
        <h1>📚 英语小助手</h1>

        <div class="search-box">
            <div class="input-group">
                <textarea id="wordInput" placeholder="" rows="1" wrap="soft" autofocus></textarea>
                <button id="searchBtn" onclick="searchWord()">查询</button>
            </div>
        </div>

        <div id="result" class="result">
            <div id="loading" class="loading" style="display:none;">查询中</div>
            <div id="error" class="error" style="display:none;"></div>
            <div id="content"></div>
        </div>
    </div>

    <script>
        const wordInput = document.getElementById('wordInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const contentDiv = document.getElementById('content');

        // 单词高亮相关
        let existingWords = new Set();
        async function loadExistingWords() {
            try {
                const res = await fetch('/api/words/exists');
                const data = await res.json();
                if (data.status === 'ok') {
                    existingWords = new Set(data.data);
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }
        loadExistingWords();

        function highlightWords(text) {
            if (!existingWords.size) return text;
            return text.replace(/\b([a-zA-Z]+)\b/g, (match, word) => {
                if (existingWords.has(word.toLowerCase())) {
                    return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${word.toLowerCase()}'">${match}</span>`;
                }
                return match;
            });
        }

        // 自动调整高度
        wordInput.addEventListener('input', autoResize);
        function autoResize() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        }

        async function searchWord() {
            const word = wordInput.value.trim();
            if (!word) return;

            // 显示加载状态
            searchBtn.disabled = true;
            resultDiv.classList.add('show');
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            contentDiv.innerHTML = '';

            try {
                const response = await fetch(`/api/word/${encodeURIComponent(word)}`);
                const data = await response.json();

                if (data.status === 'ok') {
                    renderResult(data.data, data.source);
                } else {
                    showError(data.message || '查询失败');
                }
            } catch (err) {
                showError('网络错误，请重试');
            } finally {
                searchBtn.disabled = false;
                loadingDiv.style.display = 'none';
            }
        }

        function renderResult(data, source) {
            const isSentence = data.type === 'sentence';
            const displayName = data.word || data.original || '';
            const audioKey = isSentence ? encodeURIComponent(data.dir_name || '') : encodeURIComponent(displayName);

            let html = `
                <div class="word-header">
                    <div class="word">${isSentence ? '📝 句子' : displayName}</div>
                    ${!isSentence && data.phonetic ? `<div class="phonetic">${data.phonetic}</div>` : ''}
                    <button class="play-btn" onclick="playAudio('${audioKey}', this, '${data.type}')" title="播放发音">▶</button>
                    <span class="source-badge">${source === 'cache' ? '📦 本地缓存' : '🌐 API 查询'}</span>
                </div>
            `;

            if (isSentence) {
                // 句子：显示原文和翻译
                html += `
                    <div class="section">
                        <div class="section-title">原文</div>
                        <div class="sentence-original">${highlightWords(data.original)}</div>
                    </div>
                    <div class="section">
                        <div class="section-title">翻译</div>
                        <div class="sentence-translation">${data.translation}</div>
                    </div>
                `;

                // 重点单词
                if (data.key_words && data.key_words.length > 0) {
                    html += `
                        <div class="section">
                            <div class="section-title">重点单词</div>
                            ${data.key_words.map(kw => `
                                <div class="key-word-item">
                                    <span class="key-word">${kw.word}</span>
                                    <span class="key-word-meaning">${kw.meaning}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            } else {
                // 单词：显示释义、词组、例句
                if (data.definitions && data.definitions.length > 0) {
                    html += `
                        <div class="section">
                            <div class="section-title">释义</div>
                            ${data.definitions.map(d => `
                                <div class="definition">
                                    <span class="pos">${d.pos}</span>
                                    <span class="meaning">${d.meaning}</span>
                                    <div class="english-meaning">${d.english || ''}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                if (data.phrases && data.phrases.length > 0) {
                    html += `
                        <div class="section">
                            <div class="section-title">常用词组</div>
                            ${data.phrases.map(p => `
                                <div class="phrase-item">
                                    <span class="phrase">${p.phrase}</span>
                                    <span class="phrase-meaning">${p.meaning}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                if (data.examples && data.examples.length > 0) {
                    html += `
                        <div class="section">
                            <div class="section-title">例句</div>
                            ${data.examples.map((e, i) => `
                                <div class="example">
                                    <div class="example-header">
                                        <div class="example-sentence">${highlightWords(e.sentence)}</div>
                                        <button class="sentence-play-btn" onclick="playSentenceAudio('${audioKey}', ${i + 1}, this)" title="播放例句">▶</button>
                                    </div>
                                    <div class="example-source">🎬 ${e.source || ''}</div>
                                    <div class="example-translation">${e.translation}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            }

            contentDiv.innerHTML = html;
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // 播放单词/句子音频
        let currentAudio = null;
        function playAudio(word, btn, type = 'word') {
            if (currentAudio) {
                currentAudio.pause();
                document.querySelectorAll('.play-btn.playing, .sentence-play-btn.playing').forEach(b => b.classList.remove('playing'));
            }

            const audioUrl = type === 'sentence' ?
                `/api/audio/sentence/${word}` :
                `/api/audio/${word}`;
            const audio = new Audio(audioUrl);
            currentAudio = audio;
            btn.classList.add('playing');

            audio.play().catch(err => {
                console.error('播放失败:', err);
                btn.classList.remove('playing');
            });

            audio.addEventListener('ended', () => {
                btn.classList.remove('playing');
            });
        }

        // 播放例句音频
        function playSentenceAudio(word, index, btn) {
            if (currentAudio) {
                currentAudio.pause();
                document.querySelectorAll('.play-btn.playing, .sentence-play-btn.playing').forEach(b => b.classList.remove('playing'));
            }

            const audio = new Audio(`/api/audio/${encodeURIComponent(word)}/sentence/${index}`);
            currentAudio = audio;
            btn.classList.add('playing');

            audio.play().catch(err => {
                console.error('播放失败:', err);
                btn.classList.remove('playing');
            });

            audio.addEventListener('ended', () => {
                btn.classList.remove('playing');
            });
        }

        // 设置相关
        function openSettings() {
            const modal = document.getElementById('settingsModal');
            const toast = document.getElementById('settingsToast');
            toast.className = 'modal-toast';
            modal.classList.add('show');

            // 加载当前配置
            fetch('/api/config')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'ok') {
                        document.getElementById('dataDir').value = data.data.data_dir || '';
                    }
                });
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('show');
        }

        // 点击遮罩关闭
        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) closeSettings();
        });

        function saveSettings() {
            const dataDir = document.getElementById('dataDir').value.trim();
            const toast = document.getElementById('settingsToast');

            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data_dir: dataDir })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    toast.className = 'modal-toast success';
                    toast.textContent = '✅ ' + data.message;
                    setTimeout(() => closeSettings(), 1500);
                } else {
                    toast.className = 'modal-toast error';
                    toast.textContent = '❌ ' + (data.message || '保存失败');
                }
            })
            .catch(() => {
                toast.className = 'modal-toast error';
                toast.textContent = '❌ 网络错误，请重试';
            });
        }
    </script>
</body>
</html>
