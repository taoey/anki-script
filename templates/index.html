<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .search-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .word-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .word {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        .phonetic {
            font-size: 1.2rem;
            color: #667eea;
            font-style: italic;
        }

        .source-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .definition {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .pos {
            display: inline-block;
            padding: 2px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-right: 10px;
        }

        .meaning {
            color: #333;
            font-size: 1.1rem;
        }

        .english-meaning {
            color: #666;
            font-size: 0.95rem;
            margin-top: 5px;
            font-style: italic;
        }

        .phrase-item {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .phrase-item:last-child {
            border-bottom: none;
        }

        .phrase {
            font-weight: 600;
            color: #667eea;
            min-width: 200px;
        }

        .phrase-meaning {
            color: #666;
        }

        .example {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .example-sentence {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .example-source {
            color: #667eea;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .example-translation {
            color: #666;
            font-size: 0.95rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 英语单词查询</h1>

        <div class="search-box">
            <div class="input-group">
                <input type="text" id="wordInput" placeholder="请输入英语单词..." autofocus>
                <button id="searchBtn" onclick="searchWord()">查询</button>
            </div>
        </div>

        <div id="result" class="result">
            <div id="loading" class="loading" style="display:none;">查询中</div>
            <div id="error" class="error" style="display:none;"></div>
            <div id="content"></div>
        </div>
    </div>

    <script>
        const wordInput = document.getElementById('wordInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const contentDiv = document.getElementById('content');

        // 回车搜索
        wordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWord();
        });

        async function searchWord() {
            const word = wordInput.value.trim();
            if (!word) return;

            // 显示加载状态
            searchBtn.disabled = true;
            resultDiv.classList.add('show');
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            contentDiv.innerHTML = '';

            try {
                const response = await fetch(`/api/word/${encodeURIComponent(word)}`);
                const data = await response.json();

                if (data.status === 'ok') {
                    renderResult(data.data, data.source);
                } else {
                    showError(data.message || '查询失败');
                }
            } catch (err) {
                showError('网络错误，请重试');
            } finally {
                searchBtn.disabled = false;
                loadingDiv.style.display = 'none';
            }
        }

        function renderResult(data, source) {
            let html = `
                <div class="word-header">
                    <div class="word">${data.word}</div>
                    <div class="phonetic">${data.phonetic || ''}</div>
                    <span class="source-badge">${source === 'cache' ? '📦 本地缓存' : '🌐 API 查询'}</span>
                </div>
            `;

            // 释义
            if (data.definitions && data.definitions.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">释义</div>
                        ${data.definitions.map(d => `
                            <div class="definition">
                                <span class="pos">${d.pos}</span>
                                <span class="meaning">${d.meaning}</span>
                                <div class="english-meaning">${d.english || ''}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 常用词组
            if (data.phrases && data.phrases.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">常用词组</div>
                        ${data.phrases.map(p => `
                            <div class="phrase-item">
                                <span class="phrase">${p.phrase}</span>
                                <span class="phrase-meaning">${p.meaning}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 例句
            if (data.examples && data.examples.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">例句</div>
                        ${data.examples.map(e => `
                            <div class="example">
                                <div class="example-sentence">${e.sentence}</div>
                                <div class="example-source">🎬 ${e.source || ''}</div>
                                <div class="example-translation">${e.translation}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            contentDiv.innerHTML = html;
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
