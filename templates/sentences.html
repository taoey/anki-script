<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <title>句子列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .nav-btns {
            display: flex;
            gap: 10px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: white;
            color: #667eea;
        }

        .stats {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .sentence-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .sentence-item {
            display: flex;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .sentence-item:hover {
            background: #f8f9fa;
        }

        .sentence-item:last-child {
            border-bottom: none;
        }

        .sentence-main {
            flex: 1;
        }

        .sentence-original {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .sentence-translation {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .sentence-stats {
            display: flex;
            gap: 15px;
            margin-left: 20px;
        }

        .stat-badge {
            padding: 5px 12px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #666;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            margin-left: 15px;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(102, 126, 234, 0); }
        }

        .arrow {
            color: #ccc;
            font-size: 1.2rem;
            margin-left: 15px;
        }

        .word-link {
            color: #e67e22;
            border-bottom: 1px dashed #e67e22;
            cursor: pointer;
            font-weight: 500;
        }

        .word-link:hover {
            color: #d35400;
            border-bottom-color: #d35400;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.2rem;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .empty a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 句子列表</h1>
            <div class="nav-btns">
                <a href="/words" class="back-btn">📖 单词列表</a>
                <a href="/" class="back-btn">🔍 查询</a>
            </div>
        </div>

        <div id="stats" class="stats" style="display:none;"></div>

        <div id="loading" class="loading">加载中...</div>

        <div id="sentenceList" class="sentence-list" style="display:none;"></div>

        <div id="empty" class="empty" style="display:none;">
            <p>📭 还没有查询过句子</p>
            <p style="margin-top: 15px;"><a href="/">去查询第一个句子 →</a></p>
        </div>
    </div>

    <script>
        // 单词高亮相关
        let existingWords = new Set();
        async function loadExistingWords() {
            try {
                const res = await fetch('/api/words/exists');
                const data = await res.json();
                if (data.status === 'ok') {
                    existingWords = new Set(data.data);
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }
        loadExistingWords();

        function highlightWords(text) {
            if (!existingWords.size) return text;
            return text.replace(/\b([a-zA-Z]+)\b/g, (match, word) => {
                if (existingWords.has(word.toLowerCase())) {
                    return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${word.toLowerCase()}'">${match}</span>`;
                }
                return match;
            });
        }

        async function loadSentences() {
            try {
                const response = await fetch('/api/sentences');
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data.status === 'ok' && data.data.length > 0) {
                    renderSentences(data.data);
                } else {
                    document.getElementById('empty').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('loading').textContent = '加载失败，请重试';
            }
        }

        function renderSentences(sentences) {
            // 显示统计
            const statsDiv = document.getElementById('stats');
            statsDiv.textContent = `共收录 ${sentences.length} 个句子`;
            statsDiv.style.display = 'block';

            // 渲染列表
            const listDiv = document.getElementById('sentenceList');
            listDiv.innerHTML = sentences.map(s => `
                <a href="/sentence/${s.dir_name}" class="sentence-item">
                    <div class="sentence-main">
                        <div class="sentence-original">${highlightWords(s.original)}</div>
                        <div class="sentence-translation">${s.translation || ''}</div>
                    </div>
                    <div class="sentence-stats">
                        <span class="stat-badge">${s.key_word_count} 重点词</span>
                    </div>
                    <button class="play-btn" onclick="event.preventDefault(); event.stopPropagation(); playAudio('${s.dir_name}', this)" title="播放发音">▶</button>
                    <span class="arrow">→</span>
                </a>
            `).join('');

            listDiv.style.display = 'block';
        }

        loadSentences();

        // 播放音频
        let currentAudio = null;
        function playAudio(dirName, btn) {
            if (currentAudio) {
                currentAudio.pause();
                document.querySelectorAll('.play-btn.playing').forEach(b => b.classList.remove('playing'));
            }

            const audio = new Audio(`/api/audio/sentence/${encodeURIComponent(dirName)}`);
            currentAudio = audio;
            btn.classList.add('playing');

            audio.play().catch(err => {
                console.error('播放失败:', err);
                btn.classList.remove('playing');
            });

            audio.addEventListener('ended', () => {
                btn.classList.remove('playing');
            });
        }
    </script>
</body>
</html>
