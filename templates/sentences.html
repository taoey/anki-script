<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <title>句子列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .nav-btns {
            display: flex;
            gap: 10px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: white;
            color: #667eea;
        }

        .stats {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .sentence-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .sentence-item {
            display: flex;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .sentence-item:hover {
            background: #f8f9fa;
        }

        .sentence-item:last-child {
            border-bottom: none;
        }

        .sentence-main {
            flex: 1;
        }

        .sentence-original {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.6;
            text-align: left;
        }

        .sentence-translation {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
            text-align: left;
        }

        .sentence-tags {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            background: #e8e5ff;
            color: #667eea;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: default;
            transition: all 0.2s;
        }

        .tag:hover {
            background: #d4d0ff;
        }

        .tag-delete {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border: none;
            background: transparent;
            color: #999;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 50%;
            padding: 0;
            line-height: 1;
        }

        .tag-delete:hover {
            background: rgba(0,0,0,0.1);
            color: #c62828;
        }

        .tag-add-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border: 1px dashed #ccc;
            background: transparent;
            color: #999;
            border-radius: 50%;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-add-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f0f0ff;
        }

        .tag-input-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .tag-input {
            width: 100px;
            padding: 2px 8px;
            border: 1px solid #667eea;
            border-radius: 12px;
            font-size: 0.8rem;
            outline: none;
            background: #f8f7ff;
        }

        .tag-input::placeholder {
            color: #bbb;
        }

        .tag-filter-bar {
            background: rgba(255,255,255,0.15);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .tag-filter-label {
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .tag-filter-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-filter-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 14px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .tag-filter-item:hover {
            background: rgba(255,255,255,0.35);
        }

        .tag-filter-item.active {
            background: white;
            color: #667eea;
            border-color: white;
            font-weight: 600;
        }

        .tag-filter-item .tag-count {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .word-link {
            color: #e67e22;
            border-bottom: 1px dashed #e67e22;
            cursor: pointer;
            font-weight: 500;
        }

        .word-link:hover {
            color: #d35400;
            border-bottom-color: #d35400;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.2rem;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .empty a {
            color: #667eea;
            text-decoration: none;
        }

        @media (max-width: 900px) {
            h1 {
                font-size: 1.3rem;
            }
            .nav-btns {
                gap: 6px;
            }
            .back-btn {
                padding: 6px 10px;
                font-size: 0.8rem;
                border-width: 1px;
                border-radius: 6px;
                white-space: nowrap;
            }
            .stats {
                padding: 10px 15px;
                font-size: 0.95rem;
            }
            .sentence-item {
                padding: 15px;
            }
            .sentence-original {
                font-size: 1rem;
            }
            .sentence-translation {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>句子列表</h1>
            <div class="nav-btns">
                <a href="/words" class="back-btn">📖 单词列表</a>
                <a href="/" class="back-btn">🔍 查询</a>
            </div>
        </div>

        <div id="stats" class="stats" style="display:none;"></div>

        <div id="tagFilterBar" class="tag-filter-bar">
            <div class="tag-filter-label">🏷️ 按标签筛选</div>
            <div id="tagFilterList" class="tag-filter-list"></div>
        </div>

        <div id="loading" class="loading">加载中...</div>

        <div id="sentenceList" class="sentence-list" style="display:none;"></div>

        <div id="empty" class="empty" style="display:none;">
            <p>📭 还没有查询过句子</p>
            <p style="margin-top: 15px;"><a href="/">去查询第一个句子 →</a></p>
        </div>
    </div>

    <script>
        // 全局数据
        let allSentences = [];
        let activeTag = null;

        // 单词高亮相关
        let existingWords = new Set();
        async function loadExistingWords() {
            try {
                const res = await fetch('/api/words/exists');
                const data = await res.json();
                if (data.status === 'ok') {
                    existingWords = new Set(data.data);
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }
        loadExistingWords();

        function highlightWords(text) {
            if (!existingWords.size) return text;
            return text.replace(/\b([a-zA-Z]+)\b/g, (match, word) => {
                const lower = word.toLowerCase();
                // 精确匹配优先
                if (existingWords.has(lower)) {
                    return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${lower}'">${match}</span>`;
                }
                // 包含匹配：单词中包含已收录的单词
                for (const ew of existingWords) {
                    if (lower.includes(ew)) {
                        return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${ew}'">${match}</span>`;
                    }
                }
                return match;
            });
        }

        async function loadSentences() {
            try {
                const response = await fetch('/api/sentences');
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data.status === 'ok' && data.data.length > 0) {
                    allSentences = data.data;
                    buildTagFilter(allSentences);
                    renderSentences(allSentences);
                } else {
                    document.getElementById('empty').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('loading').textContent = '加载失败，请重试';
            }
        }

        function buildTagFilter(sentences) {
            const tagCounts = {};
            sentences.forEach(s => {
                (s.tags || []).forEach(t => {
                    tagCounts[t] = (tagCounts[t] || 0) + 1;
                });
            });

            const tags = Object.keys(tagCounts).sort();
            if (tags.length === 0) return;

            const filterBar = document.getElementById('tagFilterBar');
            const filterList = document.getElementById('tagFilterList');
            filterList.innerHTML = tags.map(t =>
                `<span class="tag-filter-item" data-tag="${t}" onclick="toggleTagFilter('${t.replace(/'/g, "\\'")}')">${t} <span class="tag-count">(${tagCounts[t]})</span></span>`
            ).join('');
            filterBar.style.display = 'block';
        }

        function toggleTagFilter(tag) {
            if (activeTag === tag) {
                activeTag = null;
            } else {
                activeTag = tag;
            }

            // 更新按钮样式
            document.querySelectorAll('.tag-filter-item').forEach(el => {
                el.classList.toggle('active', el.dataset.tag === activeTag);
            });

            // 过滤并渲染
            const filtered = activeTag
                ? allSentences.filter(s => (s.tags || []).includes(activeTag))
                : allSentences;
            renderSentences(filtered);
        }

        function renderSentences(sentences) {
            // 显示统计
            const statsDiv = document.getElementById('stats');
            statsDiv.textContent = `共收录 ${sentences.length} 个句子`;
            statsDiv.style.display = 'block';

            // 渲染列表
            const listDiv = document.getElementById('sentenceList');
            listDiv.innerHTML = sentences.map(s => {
                const tags = s.tags || [];
                const tagsHtml = tags.map(t => `
                    <span class="tag">
                        ${t}
                        <button class="tag-delete" onclick="event.preventDefault(); event.stopPropagation(); deleteTag('${s.dir_name}', '${t.replace(/'/g, "\\'")}', this)" title="删除 tag">×</button>
                    </span>
                `).join('');

                return `
                <a href="/sentence/${s.dir_name}" class="sentence-item">
                    <div class="sentence-main">
                        <div class="sentence-original">${highlightWords(s.original)}</div>
                        <div class="sentence-translation">${s.translation || ''}</div>
                        <div class="sentence-tags">
                            ${tagsHtml}
                            <button class="tag-add-btn" onclick="event.preventDefault(); event.stopPropagation(); showTagInput(this, '${s.dir_name}')" title="添加 tag">+</button>
                        </div>
                    </div>
                </a>
                `;
            }).join('');

            listDiv.style.display = 'block';
        }

        function showTagInput(btn, dirName) {
            // 避免重复创建
            if (btn.parentElement.querySelector('.tag-input-wrapper')) return;

            const wrapper = document.createElement('span');
            wrapper.className = 'tag-input-wrapper';
            wrapper.innerHTML = `<input class="tag-input" type="text" placeholder="输入 tag" />`;

            btn.parentElement.insertBefore(wrapper, btn);
            const input = wrapper.querySelector('.tag-input');
            input.focus();

            input.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    e.stopPropagation();
                    const tag = input.value.trim();
                    if (tag) {
                        await addTag(dirName, tag, btn);
                    }
                    wrapper.remove();
                } else if (e.key === 'Escape') {
                    wrapper.remove();
                }
            });

            input.addEventListener('blur', () => {
                setTimeout(() => wrapper.remove(), 150);
            });
        }

        async function addTag(dirName, tag, btn) {
            try {
                const res = await fetch(`/api/sentence/${encodeURIComponent(dirName)}/tag`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tag })
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    // 在按钮前插入新 tag
                    const tagSpan = document.createElement('span');
                    tagSpan.className = 'tag';
                    tagSpan.innerHTML = `
                        ${tag}
                        <button class="tag-delete" onclick="event.preventDefault(); event.stopPropagation(); deleteTag('${dirName}', '${tag.replace(/'/g, "\\'")}', this)" title="删除 tag">×</button>
                    `;
                    btn.parentElement.insertBefore(tagSpan, btn);
                    // 同步更新本地数据并刷新筛选栏
                    const sentence = allSentences.find(s => s.dir_name === dirName);
                    if (sentence && !(sentence.tags || []).includes(tag)) {
                        sentence.tags = sentence.tags || [];
                        sentence.tags.push(tag);
                    }
                    buildTagFilter(allSentences);
                }
            } catch (err) {
                console.error('添加 tag 失败:', err);
            }
        }

        async function deleteTag(dirName, tag, btn) {
            try {
                const res = await fetch(`/api/sentence/${encodeURIComponent(dirName)}/tag/${encodeURIComponent(tag)}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    btn.parentElement.remove();
                    // 同步更新本地数据并刷新筛选栏
                    const sentence = allSentences.find(s => s.dir_name === dirName);
                    if (sentence && sentence.tags) {
                        sentence.tags = sentence.tags.filter(t => t !== tag);
                    }
                    buildTagFilter(allSentences);
                }
            } catch (err) {
                console.error('删除 tag 失败:', err);
            }
        }

        loadSentences();
    </script>
</body>
</html>
