<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <title id="title">单词详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .nav-btns {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: white;
            color: #667eea;
        }

        .delete-btn {
            padding: 6px 12px;
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .delete-btn:hover {
            background: #d32f2f;
        }

        .content {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .word-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .word {
            font-size: 3rem;
            color: #333;
            margin-bottom: 15px;
        }

        .phonetic {
            font-size: 1.3rem;
            color: #667eea;
            font-style: italic;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .phonetic:hover {
            opacity: 0.7;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(102, 126, 234, 0); }
        }

        .created-time {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
            color: #999;
            text-align: right;
        }

        .section {
            margin-bottom: 20px;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .definition {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .pos {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-right: 12px;
        }

        .meaning {
            color: #333;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .english-meaning {
            color: #666;
            font-size: 1rem;
            margin-top: 8px;
            font-style: italic;
        }

        .phrase-table {
            width: 100%;
            border-collapse: collapse;
        }

        .phrase-table tr {
            border-bottom: 1px solid #f0f0f0;
        }

        .phrase-table tr:last-child {
            border-bottom: none;
        }

        .phrase-table td {
            padding: 15px 0;
        }

        .freq-td {
            padding: 0 !important;
            width: 50px;
        }

        .phrase-table .phrase {
            font-weight: 600;
            color: #667eea;
            min-width: 200px;
        }

        .phrase-table .phrase-meaning {
            color: #666;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 1px 10px;
            background: #e8e5ff;
            color: #667eea;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .freq-high {
            background: #ffe5ec;
            color: #e91e63;
        }

        .freq-medium {
            background: #e8e5ff;
            color: #667eea;
        }

        .freq-low {
            background: #f0f0f0;
            color: #888;
        }

        .example {
            background: #f8f9fa;
            padding: 15px 18px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 3px solid #667eea;
            text-align: left;
        }

        .example:last-child {
            margin-bottom: 0;
        }

        .example-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 8px;
        }

        .example-sentence {
            font-size: 1.05rem;
            color: #333;
            line-height: 1.7;
            flex: 1;
        }

        .sentence-play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .sentence-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .sentence-play-btn:active {
            transform: scale(0.95);
        }

        .sentence-play-btn.playing {
            animation: pulse 1s infinite;
        }

        .example-source {
            color: #667eea;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .example-translation {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* 助记样式 */
        .mnemonic-section {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .mnemonic-section .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mnemonic-edit-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .mnemonic-edit-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .mnemonic-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mnemonic-item:last-child {
            border-bottom: none;
        }

        .mnemonic-label {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
            min-width: 40px;
            text-align: center;
        }

        .mnemonic-text {
            color: #000;
            font-size: 0.95rem;
            line-height: 1.6;
            flex: 1;
        }

        .mnemonic-edit textarea {
            width: 100%;
            min-height: 60px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
        }

        .mnemonic-edit textarea::placeholder {
            color: #999;
        }

        .mnemonic-edit textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.3);
        }

        .mnemonic-edit-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .mnemonic-edit-actions button {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: white;
            font-size: 1.3rem;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 12px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        .word-link {
            color: #e67e22;
            border-bottom: 1px dashed #e67e22;
            cursor: pointer;
            font-weight: 500;
        }

        .word-link:hover {
            color: #d35400;
            border-bottom-color: #d35400;
        }

        /* 左右切换箭头 */
        .arrow-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }

        .arrow-left {
            left: 20px;
        }

        .arrow-right {
            right: 20px;
        }

        .arrow-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            text-decoration: none;
            color: #667eea;
            font-size: 1.5rem;
        }

        .arrow-btn:hover {
            background: white;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .arrow-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .arrow-label {
            position: absolute;
            bottom: -25px;
            white-space: nowrap;
            font-size: 0.75rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        @media (max-width: 900px) {
            .content {
                padding: 20px 15px;
            }
            .section {
                padding: 15px;
            }
            h1 {
                font-size: 1.3rem;
            }
            .word {
                font-size: 2rem;
            }
            .phonetic {
                font-size: 1.1rem;
            }
            .header {
                flex-wrap: nowrap;
            }
            .nav-btns {
                gap: 4px;
                flex-wrap: nowrap;
                min-width: 0;
            }
            .nav-btn {
                padding: 5px 8px;
                font-size: 0.75rem;
                border-width: 1px;
                border-radius: 6px;
                white-space: nowrap;
            }
            .delete-btn {
                padding: 4px 8px;
                font-size: 0.75rem;
            }
            .phrase-table {
                table-layout: fixed;
                width: 100%;
            }
            .phrase-table .phrase {
                width: 150px;
                min-width: 0;
                word-break: break-word;
            }
            .phrase-table .phrase-meaning {
                word-break: break-word;
            }
            .example-header {
                gap: 8px;
            }
            .sentence-play-btn {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }
            .arrow-nav {
                position: fixed;
                bottom: 30px;
                top: auto;
                transform: none;
                z-index: 100;
            }
            .arrow-left {
                left: 30px;
            }
            .arrow-right {
                right: 30px;
            }
            .arrow-label {
                display: none;
            }
            body {
                padding-bottom: 100px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                padding-bottom: 80px;
            }
            .content {
                padding: 15px 10px;
            }
            .section {
                padding: 12px 10px;
            }
            .word {
                font-size: 1.6rem;
            }
            .phonetic {
                font-size: 1rem;
            }
            .definition {
                padding: 12px;
            }
            .phrase-table .phrase {
                width: 150px;
                font-size: 0.9rem;
            }
            .phrase-table .phrase-meaning {
                font-size: 0.9rem;
            }
            .example {
                padding: 10px 12px;
            }
            .arrow-btn {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            .arrow-left {
                left: 15px;
            }
            .arrow-right {
                right: 15px;
            }
            .arrow-nav {
                bottom: 20px;
            }
            .image-upload-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .image-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .image-note-input {
                font-size: 0.85rem;
            }
        }

        /* 图片模块样式 */
        .images-section {
            margin-top: 20px;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
        }

        .images-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .images-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #555;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .images-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .image-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .image-upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .image-upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .image-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .image-item:hover {
            transform: scale(1.02);
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .image-item:hover .image-item-overlay {
            opacity: 1;
        }

        .image-item-note {
            color: white;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .image-item-delete {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .image-item:hover .image-item-delete {
            opacity: 1;
        }

        .image-empty {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 0.9rem;
        }

        /* 内嵌图片模块样式 */
        .images-section-inline {
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .image-grid-inline {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .image-grid-inline .image-item {
            width: 100%;
            aspect-ratio: auto;
            max-height: 300px;
        }

        .image-grid-inline .image-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #f5f5f5;
            border-radius: 8px;
        }

        /* Lightbox 样式 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 1001;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .lightbox-image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 60px 20px 120px;
            overflow: hidden;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
            transform: scale(2);
            transition: transform 0.3s ease;
            cursor: grab;
        }

        .lightbox-image:active {
            cursor: grabbing;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        .lightbox-nav.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .lightbox-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            padding: 30px 20px 20px;
        }

        .lightbox-note {
            color: white;
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .lightbox-note:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .lightbox-note.empty {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        .lightbox-note-input {
            width: 100%;
            max-width: 500px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        .lightbox-note-input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .lightbox-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 8px;
        }

        /* 上传进度 */
        .upload-progress {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: #f8f7ff;
            border-radius: 8px;
            text-align: center;
            color: #667eea;
            font-size: 0.9rem;
        }

        .upload-progress.active {
            display: block;
        }

        .image-upload-input {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 左右切换箭头 -->
    <div class="arrow-nav arrow-left" id="arrowLeft">
        <a href="#" class="arrow-btn disabled" id="prevBtn">←</a>
        <span class="arrow-label" id="prevLabel"></span>
    </div>
    <div class="arrow-nav arrow-right" id="arrowRight">
        <a href="#" class="arrow-btn disabled" id="nextBtn">→</a>
        <span class="arrow-label" id="nextLabel"></span>
    </div>

    <div class="container">
        <div class="header">
            <div class="nav-btns">
                <a href="/words" class="nav-btn">📖 单词列表</a>
                <a href="/sentences" class="nav-btn">📝 句子列表</a>
                <a href="/" class="nav-btn">🔍 查询</a>
                <button class="delete-btn" id="deleteBtn" onclick="deleteWord()" title="删除单词" style="display:none;">🗑️ 删除</button>
            </div>
        </div>

        <div id="loading" class="loading">加载中</div>

        <div id="content" class="content" style="display:none;"></div>

        <!-- 隐藏的文件输入 -->
        <input type="file" id="imageInput" class="image-upload-input" accept="image/*" multiple onchange="handleImageUpload(this.files)">

        <!-- 上传进度提示 -->
        <div id="uploadProgress" class="upload-progress">上传中...</div>

        <div id="error" class="error" style="display:none;"></div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1, event)">←</button>
        <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1, event)">→</button>
        <div class="lightbox-image-container">
            <img id="lightboxImage" class="lightbox-image" src="" alt="">
        </div>
        <div class="lightbox-footer">
            <div id="lightboxNote" class="lightbox-note" onclick="editLightboxNote()"></div>
            <div id="lightboxInfo" class="lightbox-info"></div>
        </div>
    </div>

    <script>
        const word = "{{ word }}";
        let wordsList = [];
        let currentIndex = -1;

        document.getElementById('title').textContent = `${word} - 单词详情`;

        // 单词高亮相关
        let existingWords = new Set();
        let longWordsSorted = []; // 长度>3的单词，按长度降序排列，用于子串匹配
        async function loadExistingWords() {
            try {
                const res = await fetch('/api/words/exists');
                const data = await res.json();
                if (data.status === 'ok') {
                    existingWords = new Set(data.data);
                    // 预处理：筛选长度>3的单词，按长度降序排列
                    longWordsSorted = data.data.filter(w => w.length > 3).sort((a, b) => b.length - a.length);
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }
        loadExistingWords();

        function highlightWords(text) {
            if (!existingWords.size) return text;
            return text.replace(/\b([a-zA-Z]+)\b/g, (match, word) => {
                const lower = word.toLowerCase();
                // 精确匹配优先
                if (existingWords.has(lower)) {
                    return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${lower}'">${match}</span>`;
                }
                // 包含匹配：从最长的单词开始匹配，首个命中即为最佳
                for (const ew of longWordsSorted) {
                    if (lower.includes(ew)) {
                        return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${ew}'">${match}</span>`;
                    }
                }
                return match;
            });
        }

        // 加载单词列表并初始化导航
        async function initNavigation() {
            try {
                const response = await fetch('/api/words');
                const data = await response.json();
                if (data.status === 'ok') {
                    wordsList = data.data.map(w => w.word);
                    currentIndex = wordsList.indexOf(word);
                    updateArrowButtons();
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }

        // 更新箭头按钮状态
        function updateArrowButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevLabel = document.getElementById('prevLabel');
            const nextLabel = document.getElementById('nextLabel');

            if (currentIndex > 0) {
                prevBtn.classList.remove('disabled');
                prevBtn.href = `/word/${wordsList[currentIndex - 1]}`;
                prevLabel.textContent = wordsList[currentIndex - 1];
            } else {
                prevBtn.classList.add('disabled');
                prevLabel.textContent = '';
            }

            if (currentIndex < wordsList.length - 1) {
                nextBtn.classList.remove('disabled');
                nextBtn.href = `/word/${wordsList[currentIndex + 1]}`;
                nextLabel.textContent = wordsList[currentIndex + 1];
            } else {
                nextBtn.classList.add('disabled');
                nextLabel.textContent = '';
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                window.location.href = `/word/${wordsList[currentIndex - 1]}`;
            } else if (e.key === 'ArrowRight' && currentIndex < wordsList.length - 1) {
                window.location.href = `/word/${wordsList[currentIndex + 1]}`;
            }
        });

        async function loadWord() {
            try {
                // 使用 POST 避免 URL 长度限制
                const response = await fetch('/api/word', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word: word })
                });
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data.status === 'ok') {
                    renderWord(data.data);
                    document.getElementById('deleteBtn').style.display = 'inline-block';
                } else {
                    showError(data.message || '查询失败');
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                showError('网络错误，请重试');
            }
        }

        function renderWord(data) {
            let html = `
                <div class="word-header">
                    <div class="word">${data.word}</div>
                    <div class="phonetic" onclick="playAudio('${data.word}')" title="点击播放发音">${data.phonetic || ''}</div>
                </div>
            `;

            // 图片模块（紧跟单词之后）
            html += `
                <div id="imagesSectionInline" class="images-section-inline" style="display:none;">
                    <div class="images-header">
                        <div class="images-title">📷 现场记录</div>
                        <button class="image-upload-btn" onclick="document.getElementById('imageInput').click()">
                            <span>+</span> 上传
                        </button>
                    </div>
                    <div id="imageGridInline" class="image-grid-inline"></div>
                </div>
            `;

            // 释义
            if (data.definitions && data.definitions.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">释义</div>
                        ${data.definitions.map(d => `
                            <div class="definition">
                                <span class="pos">${d.pos}</span>
                                <span class="meaning">${d.meaning}</span>
                                ${d.english ? `<div class="english-meaning">${d.english}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 常用词组
            if (data.phrases && data.phrases.length > 0) {
                // 按频率排序：high > medium > low
                const freqOrder = { high: 0, medium: 1, low: 2 };
                const sortedPhrases = [...data.phrases].sort((a, b) => {
                    const fa = freqOrder[a.frequency] ?? 3;
                    const fb = freqOrder[b.frequency] ?? 3;
                    return fa - fb;
                });
                const hasFreq = sortedPhrases.some(p => p.frequency);
                html += `
                    <div class="section">
                        <div class="section-title">常用词组</div>
                        <table class="phrase-table">
                            ${sortedPhrases.map(p => `
                                <tr>
                                    ${hasFreq ? (p.frequency ? `<td class="freq-td"><span class="tag freq-${p.frequency}">${p.frequency === 'high' ? '高频' : p.frequency === 'medium' ? '中频' : '低频'}</span></td>` : '<td class="freq-td"></td>') : ''}
                                    <td class="phrase">${p.phrase}</td>
                                    <td class="phrase-meaning">${p.meaning}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            }

            // 例句
            if (data.examples && data.examples.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">例句</div>
                        ${data.examples.map((e, i) => `
                            <div class="example">
                                <div class="example-header">
                                    <div class="example-sentence">${highlightWords(e.sentence)}</div>
                                    <button class="sentence-play-btn" onclick="playSentenceAudio('${data.word}', ${i + 1}, this)" title="播放例句">▶</button>
                                </div>
                                ${e.source ? `<div class="example-source">${e.source}</div>` : ''}
                                <div class="example-translation">${e.translation}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 助记
            if (data.mnemonic) {
                html += `
                    <div class="section mnemonic-section">
                        <div class="section-title">
                            助记
                            <button class="mnemonic-edit-btn" onclick="toggleMnemonicEdit('${data.word}')" title="编辑助记">✏️</button>
                        </div>
                        <div class="mnemonic-display" id="mnemonic-display">
                            ${data.mnemonic.etymology ? `
                                <div class="mnemonic-item">
                                    <span class="mnemonic-label">词源</span>
                                    <span class="mnemonic-text">${data.mnemonic.etymology}</span>
                                </div>
                            ` : ''}
                            ${data.mnemonic.association ? `
                                <div class="mnemonic-item">
                                    <span class="mnemonic-label">联想</span>
                                    <span class="mnemonic-text">${data.mnemonic.association}</span>
                                </div>
                            ` : ''}
                            ${data.mnemonic.tips ? `
                                <div class="mnemonic-item">
                                    <span class="mnemonic-label">技巧</span>
                                    <span class="mnemonic-text">${data.mnemonic.tips}</span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="mnemonic-edit" id="mnemonic-edit" style="display:none;">
                            <textarea id="mnemonic-etymology" placeholder="词源/词根词缀">${data.mnemonic.etymology || ''}</textarea>
                            <textarea id="mnemonic-association" placeholder="谐音/联想记忆">${data.mnemonic.association || ''}</textarea>
                            <textarea id="mnemonic-tips" placeholder="记忆技巧">${data.mnemonic.tips || ''}</textarea>
                            <div class="mnemonic-edit-actions">
                                <button class="btn-save" onclick="saveMnemonic('${data.word}')">保存</button>
                                <button class="btn-cancel" onclick="toggleMnemonicEdit('${data.word}')">取消</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 添加时间
            if (data.created_at_str) {
                html += `
                    <div class="created-time">添加于 ${data.created_at_str}</div>
                `;
            }

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').style.display = 'block';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // 播放音频
        let currentAudio = null;
        let currentPlayingBtn = null;
        function playAudio(word) {
            // 停止之前的音频
            if (currentAudio) {
                currentAudio.pause();
            }

            const audio = new Audio(`/api/audio/${encodeURIComponent(word)}`);
            currentAudio = audio;

            audio.play().catch(err => {
                console.error('播放失败:', err);
            });
        }

        // 播放例句音频
        function playSentenceAudio(word, index, btn) {
            // 如果点击的是当前正在播放的按钮，则暂停
            if (currentAudio && currentPlayingBtn === btn && !currentAudio.paused) {
                currentAudio.pause();
                btn.textContent = '▶';
                btn.classList.remove('playing');
                return;
            }

            // 停止之前的音频
            if (currentAudio) {
                currentAudio.pause();
                if (currentPlayingBtn) {
                    currentPlayingBtn.textContent = '▶';
                    currentPlayingBtn.classList.remove('playing');
                }
            }

            const audio = new Audio(`/api/audio/${encodeURIComponent(word)}/sentence/${index}`);
            currentAudio = audio;
            currentPlayingBtn = btn;
            btn.textContent = '⏸';
            btn.classList.add('playing');

            audio.play().catch(err => {
                console.error('播放失败:', err);
                btn.textContent = '▶';
                btn.classList.remove('playing');
            });

            audio.addEventListener('ended', () => {
                btn.textContent = '▶';
                btn.classList.remove('playing');
            });
        }

        // 助记编辑
        function toggleMnemonicEdit(word) {
            const display = document.getElementById('mnemonic-display');
            const edit = document.getElementById('mnemonic-edit');
            const editBtn = document.querySelector('.mnemonic-edit-btn');

            if (edit.style.display === 'none') {
                display.style.display = 'none';
                edit.style.display = 'block';
                editBtn.textContent = '✕';
                editBtn.title = '取消编辑';
            } else {
                display.style.display = 'block';
                edit.style.display = 'none';
                editBtn.textContent = '✏️';
                editBtn.title = '编辑助记';
            }
        }

        async function saveMnemonic(word) {
            const etymology = document.getElementById('mnemonic-etymology').value.trim();
            const association = document.getElementById('mnemonic-association').value.trim();
            const tips = document.getElementById('mnemonic-tips').value.trim();

            const mnemonic = {};
            if (etymology) mnemonic.etymology = etymology;
            if (association) mnemonic.association = association;
            if (tips) mnemonic.tips = tips;

            try {
                const res = await fetch(`/api/word/${encodeURIComponent(word)}/mnemonic`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mnemonic })
                });
                const data = await res.json();

                if (data.status === 'ok') {
                    // 更新显示
                    const display = document.getElementById('mnemonic-display');
                    let displayHtml = '';
                    if (mnemonic.etymology) {
                        displayHtml += `<div class="mnemonic-item"><span class="mnemonic-label">词源</span><span class="mnemonic-text">${mnemonic.etymology}</span></div>`;
                    }
                    if (mnemonic.association) {
                        displayHtml += `<div class="mnemonic-item"><span class="mnemonic-label">联想</span><span class="mnemonic-text">${mnemonic.association}</span></div>`;
                    }
                    if (mnemonic.tips) {
                        displayHtml += `<div class="mnemonic-item"><span class="mnemonic-label">技巧</span><span class="mnemonic-text">${mnemonic.tips}</span></div>`;
                    }
                    display.innerHTML = displayHtml;

                    toggleMnemonicEdit(word);
                } else {
                    alert('保存失败: ' + data.message);
                }
            } catch (err) {
                alert('网络错误，请重试');
            }
        }

        // 初始化
        loadWord().then(() => {
            loadImages();
        });
        initNavigation();

        // ==================== 图片相关功能 ====================

        let currentImages = [];
        let currentLightboxIndex = -1;

        // 加载图片列表
        async function loadImages() {
            try {
                const response = await fetch('/api/word', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word: word })
                });
                const data = await response.json();

                if (data.status === 'ok' && data.data.images && data.data.images.length > 0) {
                    currentImages = data.data.images;
                    renderImageGrid();
                    const section = document.getElementById('imagesSectionInline');
                    if (section) section.style.display = 'block';
                } else {
                    currentImages = [];
                    renderImageGrid();
                    // 没有图片时也显示模块（显示上传提示）
                    const section = document.getElementById('imagesSectionInline');
                    if (section) section.style.display = 'block';
                }
            } catch (err) {
                console.error('加载图片失败:', err);
            }
        }

        // 渲染图片网格
        function renderImageGrid() {
            const grid = document.getElementById('imageGridInline');
            if (!grid) return;

            if (currentImages.length === 0) {
                grid.innerHTML = '<div class="image-empty">暂无图片，点击上方按钮上传记录</div>';
                return;
            }

            grid.innerHTML = currentImages.map((img, index) => `
                <div class="image-item" onclick="openLightbox(${index})">
                    <img src="/api/word/${encodeURIComponent(word)}/images/${img.filename}" alt="${img.original_name}" loading="lazy">
                    <div class="image-item-overlay">
                        <div class="image-item-note">${img.note || '点击查看详情'}</div>
                    </div>
                    <button class="image-item-delete" onclick="deleteImage('${img.filename}', event)" title="删除图片">✕</button>
                </div>
            `).join('');
        }

        // 处理图片上传
        async function handleImageUpload(files) {
            if (!files || files.length === 0) return;

            const progress = document.getElementById('uploadProgress');
            const uploadBtn = document.querySelector('.image-upload-btn');

            progress.classList.add('active');
            progress.textContent = '上传中...';
            uploadBtn.disabled = true;

            let successCount = 0;
            let failCount = 0;

            for (const file of files) {
                try {
                    const formData = new FormData();
                    formData.append('image', file);

                    const response = await fetch(`/api/word/${encodeURIComponent(word)}/images`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    if (data.status === 'ok') {
                        successCount++;
                    } else {
                        failCount++;
                        console.error('上传失败:', data.message);
                    }
                } catch (err) {
                    failCount++;
                    console.error('上传错误:', err);
                }
            }

            progress.textContent = `上传完成：${successCount} 成功，${failCount} 失败`;
            setTimeout(() => {
                progress.classList.remove('active');
            }, 3000);

            uploadBtn.disabled = false;
            document.getElementById('imageInput').value = '';

            // 重新加载图片
            await loadImages();
        }

        // 删除图片
        async function deleteImage(filename, event) {
            event.stopPropagation();

            if (!confirm('确定要删除这张图片吗？')) return;

            try {
                const response = await fetch(`/api/word/${encodeURIComponent(word)}/images/${filename}`, {
                    method: 'DELETE'
                });

                const data = await response.json();
                if (data.status === 'ok') {
                    await loadImages();
                } else {
                    alert('删除失败: ' + data.message);
                }
            } catch (err) {
                alert('删除失败，请重试');
            }
        }

        // Lightbox 功能
        function openLightbox(index) {
            currentLightboxIndex = index;
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.add('active');
            updateLightboxContent();
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(event) {
            // 如果是键盘事件或关闭按钮，直接关闭
            if (!event || event.type === 'keydown' || event.target.classList.contains('lightbox-close')) {
                const lightbox = document.getElementById('lightbox');
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
                currentLightboxIndex = -1;
                return;
            }

            // 点击图片或导航按钮时不关闭
            if (event.target.classList.contains('lightbox-image') ||
                event.target.classList.contains('lightbox-nav') ||
                event.target.classList.contains('lightbox-note') ||
                event.target.classList.contains('lightbox-note-input') ||
                event.target.closest('.lightbox-footer')) {
                return;
            }

            // 点击其他区域关闭
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            currentLightboxIndex = -1;
        }

        function navigateLightbox(direction, event) {
            event.stopPropagation();

            const newIndex = currentLightboxIndex + direction;
            if (newIndex >= 0 && newIndex < currentImages.length) {
                currentLightboxIndex = newIndex;
                updateLightboxContent();
            }
        }

        function updateLightboxContent() {
            const img = currentImages[currentLightboxIndex];
            const lightboxImage = document.getElementById('lightboxImage');
            const lightboxNote = document.getElementById('lightboxNote');
            const lightboxInfo = document.getElementById('lightboxInfo');
            const prevBtn = document.querySelector('.lightbox-prev');
            const nextBtn = document.querySelector('.lightbox-next');

            // 重置图片变换状态
            resetImageTransform();

            lightboxImage.src = `/api/word/${encodeURIComponent(word)}/images/${img.filename}`;

            if (img.note) {
                lightboxNote.textContent = img.note;
                lightboxNote.classList.remove('empty');
            } else {
                lightboxNote.textContent = '点击添加备注';
                lightboxNote.classList.add('empty');
            }

            lightboxInfo.textContent = `${currentLightboxIndex + 1} / ${currentImages.length} · ${img.uploaded_at_str}`;

            // 更新导航按钮状态
            prevBtn.classList.toggle('disabled', currentLightboxIndex === 0);
            nextBtn.classList.toggle('disabled', currentLightboxIndex === currentImages.length - 1);
        }

        // 编辑 Lightbox 备注
        function editLightboxNote() {
            const lightboxNote = document.getElementById('lightboxNote');
            const img = currentImages[currentLightboxIndex];
            const currentNote = img.note || '';

            lightboxNote.innerHTML = `
                <input type="text" class="lightbox-note-input" value="${currentNote}" placeholder="输入备注（如：在 XX 文章看到）" id="noteInput">
            `;

            const noteInput = document.getElementById('noteInput');
            noteInput.focus();
            noteInput.select();

            noteInput.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    await saveLightboxNote(noteInput.value);
                } else if (e.key === 'Escape') {
                    updateLightboxContent();
                }
            });

            noteInput.addEventListener('blur', async () => {
                await saveLightboxNote(noteInput.value);
            });
        }

        async function saveLightboxNote(note) {
            const img = currentImages[currentLightboxIndex];

            try {
                const response = await fetch(`/api/word/${encodeURIComponent(word)}/images/${img.filename}/note`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note: note })
                });

                const data = await response.json();
                if (data.status === 'ok') {
                    // 更新本地数据
                    img.note = note;
                    updateLightboxContent();
                    renderImageGrid();
                }
            } catch (err) {
                console.error('保存备注失败:', err);
                updateLightboxContent();
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;

            if (e.key === 'Escape') {
                closeLightbox();
            } else if (e.key === 'ArrowLeft') {
                navigateLightbox(-1, e);
            } else if (e.key === 'ArrowRight') {
                navigateLightbox(1, e);
            }
        });

        // 图片拖拽功能
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;
        let currentScale = 2;

        function initImageDrag() {
            const image = document.getElementById('lightboxImage');
            if (!image) return;

            // 鼠标拖拽
            image.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                image.style.cursor = 'grabbing';
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                updateImageTransform();
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                const image = document.getElementById('lightboxImage');
                if (image) image.style.cursor = 'grab';
            });

            // 触摸拖拽
            image.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX - translateX;
                    startY = e.touches[0].clientY - translateY;
                }
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                updateImageTransform();
            }, { passive: true });

            document.addEventListener('touchend', () => {
                isDragging = false;
            });

            // 滚轮缩放
            const container = document.querySelector('.lightbox-image-container');
            if (container) {
                container.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.2 : 0.2;
                    currentScale = Math.max(0.5, Math.min(5, currentScale + delta));
                    updateImageTransform();
                }, { passive: false });
            }
        }

        function updateImageTransform() {
            const image = document.getElementById('lightboxImage');
            if (!image) return;
            image.style.transform = `scale(${currentScale}) translate(${translateX / currentScale}px, ${translateY / currentScale}px)`;
        }

        function resetImageTransform() {
            translateX = 0;
            translateY = 0;
            currentScale = 2;
            updateImageTransform();
        }

        // 初始化拖拽
        initImageDrag();

        async function deleteWord() {
            if (!confirm(`确定要删除单词 "${word}" 吗？`)) return;

            try {
                const res = await fetch(`/api/word/${encodeURIComponent(word)}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    // 跳转到单词列表页，如果没有上一个/下一个则回列表
                    if (currentIndex > 0 && wordsList.length > 1) {
                        window.location.href = `/word/${wordsList[currentIndex - 1]}`;
                    } else if (currentIndex < wordsList.length - 1) {
                        window.location.href = `/word/${wordsList[currentIndex + 1]}`;
                    } else {
                        window.location.href = '/words';
                    }
                } else {
                    alert('删除失败: ' + (data.message || '未知错误'));
                }
            } catch (err) {
                console.error('删除单词失败:', err);
                alert('删除失败，请重试');
            }
        }
    </script>
</body>
</html>
