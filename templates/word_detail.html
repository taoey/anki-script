<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <title id="title">单词详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .nav-btns {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: white;
            color: #667eea;
        }

        .content {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .word-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .word {
            font-size: 3rem;
            color: #333;
            margin-bottom: 15px;
        }

        .phonetic {
            font-size: 1.3rem;
            color: #667eea;
            font-style: italic;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .phonetic:hover {
            opacity: 0.7;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(102, 126, 234, 0); }
        }

        .created-time {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
            color: #999;
            text-align: right;
        }

        .section {
            margin-bottom: 20px;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .definition {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .pos {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-right: 12px;
        }

        .meaning {
            color: #333;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .english-meaning {
            color: #666;
            font-size: 1rem;
            margin-top: 8px;
            font-style: italic;
        }

        .phrase-table {
            width: 100%;
            border-collapse: collapse;
        }

        .phrase-table tr {
            border-bottom: 1px solid #f0f0f0;
        }

        .phrase-table tr:last-child {
            border-bottom: none;
        }

        .phrase-table td {
            padding: 15px 0;
        }

        .phrase-table .phrase {
            font-weight: 600;
            color: #667eea;
            min-width: 200px;
        }

        .phrase-table .phrase-meaning {
            color: #666;
        }

        .example {
            background: #f8f9fa;
            padding: 15px 18px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 3px solid #667eea;
            text-align: left;
        }

        .example:last-child {
            margin-bottom: 0;
        }

        .example-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 8px;
        }

        .example-sentence {
            font-size: 1.05rem;
            color: #333;
            line-height: 1.7;
            flex: 1;
        }

        .sentence-play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .sentence-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .sentence-play-btn:active {
            transform: scale(0.95);
        }

        .sentence-play-btn.playing {
            animation: pulse 1s infinite;
        }

        .example-source {
            color: #667eea;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .example-translation {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: white;
            font-size: 1.3rem;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 12px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        .word-link {
            color: #e67e22;
            border-bottom: 1px dashed #e67e22;
            cursor: pointer;
            font-weight: 500;
        }

        .word-link:hover {
            color: #d35400;
            border-bottom-color: #d35400;
        }

        /* 左右切换箭头 */
        .arrow-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }

        .arrow-left {
            left: 20px;
        }

        .arrow-right {
            right: 20px;
        }

        .arrow-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            text-decoration: none;
            color: #667eea;
            font-size: 1.5rem;
        }

        .arrow-btn:hover {
            background: white;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .arrow-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .arrow-label {
            position: absolute;
            bottom: -25px;
            white-space: nowrap;
            font-size: 0.75rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        @media (max-width: 900px) {
            .content {
                padding: 20px 15px;
            }
            .section {
                padding: 15px;
            }
            h1 {
                font-size: 1.3rem;
            }
            .word {
                font-size: 2rem;
            }
            .phonetic {
                font-size: 1.1rem;
            }
            .nav-btns {
                gap: 6px;
                flex-wrap: nowrap;
            }
            .nav-btn {
                padding: 6px 10px;
                font-size: 0.8rem;
                border-width: 1px;
                border-radius: 6px;
                white-space: nowrap;
            }
            .arrow-nav {
                position: fixed;
                bottom: 30px;
                top: auto;
                transform: none;
                z-index: 100;
            }
            .arrow-left {
                left: 30px;
            }
            .arrow-right {
                right: 30px;
            }
            .arrow-label {
                display: none;
            }
            body {
                padding-bottom: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- 左右切换箭头 -->
    <div class="arrow-nav arrow-left" id="arrowLeft">
        <a href="#" class="arrow-btn disabled" id="prevBtn">←</a>
        <span class="arrow-label" id="prevLabel"></span>
    </div>
    <div class="arrow-nav arrow-right" id="arrowRight">
        <a href="#" class="arrow-btn disabled" id="nextBtn">→</a>
        <span class="arrow-label" id="nextLabel"></span>
    </div>

    <div class="container">
        <div class="header">
            <div class="nav-btns">
                <a href="/words" class="nav-btn">📖 单词列表</a>
                <a href="/sentences" class="nav-btn">📝 句子列表</a>
                <a href="/" class="nav-btn">🔍 查询</a>
            </div>
        </div>

        <div id="loading" class="loading">加载中</div>

        <div id="content" class="content" style="display:none;"></div>

        <div id="error" class="error" style="display:none;"></div>
    </div>

    <script>
        const word = "{{ word }}";
        let wordsList = [];
        let currentIndex = -1;

        document.getElementById('title').textContent = `${word} - 单词详情`;

        // 单词高亮相关
        let existingWords = new Set();
        async function loadExistingWords() {
            try {
                const res = await fetch('/api/words/exists');
                const data = await res.json();
                if (data.status === 'ok') {
                    existingWords = new Set(data.data);
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }
        loadExistingWords();

        function highlightWords(text) {
            if (!existingWords.size) return text;
            return text.replace(/\b([a-zA-Z]+)\b/g, (match, word) => {
                const lower = word.toLowerCase();
                // 精确匹配优先
                if (existingWords.has(lower)) {
                    return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${lower}'">${match}</span>`;
                }
                // 包含匹配：单词中包含已收录的单词
                for (const ew of existingWords) {
                    if (lower.includes(ew)) {
                        return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${ew}'">${match}</span>`;
                    }
                }
                return match;
            });
        }

        // 加载单词列表并初始化导航
        async function initNavigation() {
            try {
                const response = await fetch('/api/words');
                const data = await response.json();
                if (data.status === 'ok') {
                    wordsList = data.data.map(w => w.word);
                    currentIndex = wordsList.indexOf(word);
                    updateArrowButtons();
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }

        // 更新箭头按钮状态
        function updateArrowButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevLabel = document.getElementById('prevLabel');
            const nextLabel = document.getElementById('nextLabel');

            if (currentIndex > 0) {
                prevBtn.classList.remove('disabled');
                prevBtn.href = `/word/${wordsList[currentIndex - 1]}`;
                prevLabel.textContent = wordsList[currentIndex - 1];
            } else {
                prevBtn.classList.add('disabled');
                prevLabel.textContent = '';
            }

            if (currentIndex < wordsList.length - 1) {
                nextBtn.classList.remove('disabled');
                nextBtn.href = `/word/${wordsList[currentIndex + 1]}`;
                nextLabel.textContent = wordsList[currentIndex + 1];
            } else {
                nextBtn.classList.add('disabled');
                nextLabel.textContent = '';
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                window.location.href = `/word/${wordsList[currentIndex - 1]}`;
            } else if (e.key === 'ArrowRight' && currentIndex < wordsList.length - 1) {
                window.location.href = `/word/${wordsList[currentIndex + 1]}`;
            }
        });

        async function loadWord() {
            try {
                // 使用 POST 避免 URL 长度限制
                const response = await fetch('/api/word', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word: word })
                });
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data.status === 'ok') {
                    renderWord(data.data);
                } else {
                    showError(data.message || '查询失败');
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                showError('网络错误，请重试');
            }
        }

        function renderWord(data) {
            let html = `
                <div class="word-header">
                    <div class="word">${data.word}</div>
                    <div class="phonetic" onclick="playAudio('${data.word}')" title="点击播放发音">${data.phonetic || ''}</div>
                </div>
            `;

            // 释义
            if (data.definitions && data.definitions.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">释义</div>
                        ${data.definitions.map(d => `
                            <div class="definition">
                                <span class="pos">${d.pos}</span>
                                <span class="meaning">${d.meaning}</span>
                                ${d.english ? `<div class="english-meaning">${d.english}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 常用词组
            if (data.phrases && data.phrases.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">常用词组</div>
                        <table class="phrase-table">
                            ${data.phrases.map(p => `
                                <tr>
                                    <td class="phrase">${p.phrase}</td>
                                    <td class="phrase-meaning">${p.meaning}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            }

            // 例句
            if (data.examples && data.examples.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">例句</div>
                        ${data.examples.map((e, i) => `
                            <div class="example">
                                <div class="example-header">
                                    <div class="example-sentence">${highlightWords(e.sentence)}</div>
                                    <button class="sentence-play-btn" onclick="playSentenceAudio('${data.word}', ${i + 1}, this)" title="播放例句">▶</button>
                                </div>
                                ${e.source ? `<div class="example-source">${e.source}</div>` : ''}
                                <div class="example-translation">${e.translation}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 添加时间
            if (data.created_at_str) {
                html += `
                    <div class="created-time">添加于 ${data.created_at_str}</div>
                `;
            }

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').style.display = 'block';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // 播放音频
        let currentAudio = null;
        let currentPlayingBtn = null;
        function playAudio(word) {
            // 停止之前的音频
            if (currentAudio) {
                currentAudio.pause();
            }

            const audio = new Audio(`/api/audio/${encodeURIComponent(word)}`);
            currentAudio = audio;

            audio.play().catch(err => {
                console.error('播放失败:', err);
            });
        }

        // 播放例句音频
        function playSentenceAudio(word, index, btn) {
            // 如果点击的是当前正在播放的按钮，则暂停
            if (currentAudio && currentPlayingBtn === btn && !currentAudio.paused) {
                currentAudio.pause();
                btn.textContent = '▶';
                btn.classList.remove('playing');
                return;
            }

            // 停止之前的音频
            if (currentAudio) {
                currentAudio.pause();
                if (currentPlayingBtn) {
                    currentPlayingBtn.textContent = '▶';
                    currentPlayingBtn.classList.remove('playing');
                }
            }

            const audio = new Audio(`/api/audio/${encodeURIComponent(word)}/sentence/${index}`);
            currentAudio = audio;
            currentPlayingBtn = btn;
            btn.textContent = '⏸';
            btn.classList.add('playing');

            audio.play().catch(err => {
                console.error('播放失败:', err);
                btn.textContent = '▶';
                btn.classList.remove('playing');
            });

            audio.addEventListener('ended', () => {
                btn.textContent = '▶';
                btn.classList.remove('playing');
            });
        }

        // 初始化
        loadWord();
        initNavigation();
    </script>
</body>
</html>
