<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <title id="title">单词详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .nav-btns {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: white;
            color: #667eea;
        }

        .content {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .word-header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
        }

        .word {
            font-size: 3rem;
            color: #333;
            margin-bottom: 15px;
        }

        .phonetic {
            font-size: 1.3rem;
            color: #667eea;
            font-style: italic;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(102, 126, 234, 0); }
        }

        .created-time {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
            color: #999;
            text-align: right;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.4rem;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 5px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
        }

        .definition {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .pos {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-right: 12px;
        }

        .meaning {
            color: #333;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .english-meaning {
            color: #666;
            font-size: 1rem;
            margin-top: 8px;
            font-style: italic;
        }

        .phrase-table {
            width: 100%;
            border-collapse: collapse;
        }

        .phrase-table tr {
            border-bottom: 1px solid #f0f0f0;
        }

        .phrase-table tr:last-child {
            border-bottom: none;
        }

        .phrase-table td {
            padding: 15px 0;
        }

        .phrase-table .phrase {
            font-weight: 600;
            color: #667eea;
            min-width: 200px;
        }

        .phrase-table .phrase-meaning {
            color: #666;
        }

        .example {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }

        .example-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .example-sentence {
            font-size: 1.15rem;
            color: #333;
            line-height: 1.7;
            flex: 1;
        }

        .sentence-play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .sentence-play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .sentence-play-btn:active {
            transform: scale(0.95);
        }

        .sentence-play-btn.playing {
            animation: pulse 1s infinite;
        }

        .example-source {
            color: #667eea;
            font-size: 0.95rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .example-translation {
            color: #666;
            font-size: 1rem;
            line-height: 1.5;
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: white;
            font-size: 1.3rem;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 12px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        .word-link {
            color: #e67e22;
            border-bottom: 1px dashed #e67e22;
            cursor: pointer;
            font-weight: 500;
        }

        .word-link:hover {
            color: #d35400;
            border-bottom-color: #d35400;
        }

        /* 左右切换箭头 */
        .arrow-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }

        .arrow-left {
            left: 20px;
        }

        .arrow-right {
            right: 20px;
        }

        .arrow-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            text-decoration: none;
            color: #667eea;
            font-size: 1.5rem;
        }

        .arrow-btn:hover {
            background: white;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .arrow-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .arrow-label {
            position: absolute;
            bottom: -25px;
            white-space: nowrap;
            font-size: 0.75rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        @media (max-width: 900px) {
            .arrow-nav {
                position: fixed;
                bottom: 30px;
                top: auto;
                transform: none;
                z-index: 100;
            }
            .arrow-left {
                left: 30px;
            }
            .arrow-right {
                right: 30px;
            }
            .arrow-label {
                display: none;
            }
            body {
                padding-bottom: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- 左右切换箭头 -->
    <div class="arrow-nav arrow-left" id="arrowLeft">
        <a href="#" class="arrow-btn disabled" id="prevBtn">←</a>
        <span class="arrow-label" id="prevLabel"></span>
    </div>
    <div class="arrow-nav arrow-right" id="arrowRight">
        <a href="#" class="arrow-btn disabled" id="nextBtn">→</a>
        <span class="arrow-label" id="nextLabel"></span>
    </div>

    <div class="container">
        <div class="header">
            <h1 id="pageTitle">📖 单词详情</h1>
            <div class="nav-btns">
                <a href="/words" class="nav-btn">📖 单词列表</a>
                <a href="/sentences" class="nav-btn">📝 句子列表</a>
                <a href="/" class="nav-btn">🔍 查询</a>
            </div>
        </div>

        <div id="loading" class="loading">加载中</div>

        <div id="content" class="content" style="display:none;"></div>

        <div id="error" class="error" style="display:none;"></div>
    </div>

    <script>
        const word = "{{ word }}";
        let wordsList = [];
        let currentIndex = -1;

        document.getElementById('title').textContent = `${word} - 单词详情`;
        document.getElementById('pageTitle').textContent = `📖 ${word}`;

        // 单词高亮相关
        let existingWords = new Set();
        async function loadExistingWords() {
            try {
                const res = await fetch('/api/words/exists');
                const data = await res.json();
                if (data.status === 'ok') {
                    existingWords = new Set(data.data);
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }
        loadExistingWords();

        function highlightWords(text) {
            if (!existingWords.size) return text;
            return text.replace(/\b([a-zA-Z]+)\b/g, (match, word) => {
                if (existingWords.has(word.toLowerCase())) {
                    return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${word.toLowerCase()}'">${match}</span>`;
                }
                return match;
            });
        }

        // 加载单词列表并初始化导航
        async function initNavigation() {
            try {
                const response = await fetch('/api/words');
                const data = await response.json();
                if (data.status === 'ok') {
                    wordsList = data.data.map(w => w.word);
                    currentIndex = wordsList.indexOf(word);
                    updateArrowButtons();
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }

        // 更新箭头按钮状态
        function updateArrowButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevLabel = document.getElementById('prevLabel');
            const nextLabel = document.getElementById('nextLabel');

            if (currentIndex > 0) {
                prevBtn.classList.remove('disabled');
                prevBtn.href = `/word/${wordsList[currentIndex - 1]}`;
                prevLabel.textContent = wordsList[currentIndex - 1];
            } else {
                prevBtn.classList.add('disabled');
                prevLabel.textContent = '';
            }

            if (currentIndex < wordsList.length - 1) {
                nextBtn.classList.remove('disabled');
                nextBtn.href = `/word/${wordsList[currentIndex + 1]}`;
                nextLabel.textContent = wordsList[currentIndex + 1];
            } else {
                nextBtn.classList.add('disabled');
                nextLabel.textContent = '';
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                window.location.href = `/word/${wordsList[currentIndex - 1]}`;
            } else if (e.key === 'ArrowRight' && currentIndex < wordsList.length - 1) {
                window.location.href = `/word/${wordsList[currentIndex + 1]}`;
            }
        });

        async function loadWord() {
            try {
                const response = await fetch(`/api/word/${encodeURIComponent(word)}`);
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data.status === 'ok') {
                    renderWord(data.data);
                } else {
                    showError(data.message || '查询失败');
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                showError('网络错误，请重试');
            }
        }

        function renderWord(data) {
            let html = `
                <div class="word-header">
                    <div class="word">${data.word}</div>
                    <div class="phonetic">${data.phonetic || ''}</div>
                    <button class="play-btn" onclick="playAudio('${data.word}', this)" title="播放发音">▶</button>
                </div>
            `;

            // 释义
            if (data.definitions && data.definitions.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">释义</div>
                        ${data.definitions.map(d => `
                            <div class="definition">
                                <span class="pos">${d.pos}</span>
                                <span class="meaning">${d.meaning}</span>
                                ${d.english ? `<div class="english-meaning">${d.english}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 常用词组
            if (data.phrases && data.phrases.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">常用词组</div>
                        <table class="phrase-table">
                            ${data.phrases.map(p => `
                                <tr>
                                    <td class="phrase">${p.phrase}</td>
                                    <td class="phrase-meaning">${p.meaning}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            }

            // 例句
            if (data.examples && data.examples.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">例句</div>
                        ${data.examples.map((e, i) => `
                            <div class="example">
                                <div class="example-header">
                                    <div class="example-sentence">${highlightWords(e.sentence)}</div>
                                    <button class="sentence-play-btn" onclick="playSentenceAudio('${data.word}', ${i + 1}, this)" title="播放例句">▶</button>
                                </div>
                                ${e.source ? `<div class="example-source">🎬 ${e.source}</div>` : ''}
                                <div class="example-translation">${e.translation}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // 添加时间
            if (data.created_at_str) {
                html += `
                    <div class="created-time">📅 添加于 ${data.created_at_str}</div>
                `;
            }

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').style.display = 'block';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // 播放音频
        let currentAudio = null;
        function playAudio(word, btn) {
            if (currentAudio) {
                currentAudio.pause();
                document.querySelectorAll('.play-btn.playing').forEach(b => b.classList.remove('playing'));
            }

            const audio = new Audio(`/api/audio/${encodeURIComponent(word)}`);
            currentAudio = audio;
            btn.classList.add('playing');

            audio.play().catch(err => {
                console.error('播放失败:', err);
                btn.classList.remove('playing');
            });

            audio.addEventListener('ended', () => {
                btn.classList.remove('playing');
            });
        }

        // 播放例句音频
        function playSentenceAudio(word, index, btn) {
            if (currentAudio) {
                currentAudio.pause();
                document.querySelectorAll('.play-btn.playing, .sentence-play-btn.playing').forEach(b => b.classList.remove('playing'));
            }

            const audio = new Audio(`/api/audio/${encodeURIComponent(word)}/sentence/${index}`);
            currentAudio = audio;
            btn.classList.add('playing');

            audio.play().catch(err => {
                console.error('播放失败:', err);
                btn.classList.remove('playing');
            });

            audio.addEventListener('ended', () => {
                btn.classList.remove('playing');
            });
        }

        // 初始化
        loadWord();
        initNavigation();
    </script>
</body>
</html>
