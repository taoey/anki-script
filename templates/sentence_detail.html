<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <title id="title">句子详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .nav-btns {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: white;
            color: #667eea;
        }

        /* 移动端缩短文字 */
        .nav-btn .long-text { display: inline; }
        .nav-btn .short-text { display: none; }
        .delete-btn .long-text { display: inline; }
        .delete-btn .short-text { display: none; }

        .content {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .sentence-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .sentence-label {
            font-size: 1rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .sentence-original {
            font-size: 1.1rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 15px;
            text-align: left;
            white-space: pre-wrap;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn.playing {
            animation: pulse 1s infinite;
        }

        .header-play-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            margin-top: 0;
            width: 32px;
            height: 32px;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .header-play-btn:hover {
            background: white;
            color: #667eea;
        }

        .delete-btn {
            padding: 6px 12px;
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .delete-btn:hover {
            background: #d32f2f;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(102, 126, 234, 0); }
        }

        .section {
            margin-bottom: 20px;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .translation {
            font-size: 1.1rem;
            color: #555;
            line-height: 1.8;
            text-align: left;
            white-space: pre-wrap;
        }

        .key-word-item {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .key-word-item:last-child {
            border-bottom: none;
        }

        .key-word {
            font-weight: 600;
            color: #667eea;
            min-width: 150px;
            font-size: 1.1rem;
        }

        .key-word-meaning {
            color: #666;
            font-size: 1.05rem;
        }

        .created-time {
            margin-top: 10px;
            padding: 10px 0;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
            color: #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sentence-tags {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 1px 10px;
            background: #e8e5ff;
            color: #667eea;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .tag-delete {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border: none;
            background: transparent;
            color: #999;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 50%;
            padding: 0;
            line-height: 1;
        }

        .tag-delete:hover {
            background: rgba(0,0,0,0.1);
            color: #c62828;
        }

        .tag-add-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border: 1px dashed #ccc;
            background: transparent;
            color: #999;
            border-radius: 50%;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-add-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f0f0ff;
        }

        .tag-input-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .tag-input {
            width: 110px;
            padding: 3px 8px;
            border: 1px solid #667eea;
            border-radius: 12px;
            font-size: 0.85rem;
            outline: none;
            background: #f8f7ff;
        }

        .word-link {
            color: #e67e22;
            border-bottom: 1px dashed #e67e22;
            cursor: pointer;
            font-weight: 500;
        }

        .word-link:hover {
            color: #d35400;
            border-bottom-color: #d35400;
        }

        .study-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .study-stat {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: #f8f7ff;
            border-radius: 8px;
        }

        .study-stat-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: #667eea;
        }

        .study-stat-label {
            font-size: 0.8rem;
            color: #999;
            margin-top: 4px;
        }

        .study-record {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9rem;
            color: #666;
        }

        .study-record:last-child {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: white;
            font-size: 1.3rem;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        /* 左右切换箭头 */
        .arrow-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }

        .arrow-left {
            left: 20px;
        }

        .arrow-right {
            right: 20px;
        }

        .arrow-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            text-decoration: none;
            color: #667eea;
            font-size: 1.5rem;
        }

        .arrow-btn:hover {
            background: white;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .arrow-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .arrow-label {
            position: absolute;
            bottom: -25px;
            white-space: nowrap;
            font-size: 0.75rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 900px) {
            .content {
                padding: 20px 15px;
            }
            .section {
                padding: 15px;
            }
            .sentence-original {
                font-size: 1rem;
            }
            .translation {
                font-size: 1rem;
            }
            h1 {
                font-size: 1.3rem;
            }
            .header {
                flex-wrap: nowrap;
            }
            .nav-btns {
                gap: 4px;
                flex-wrap: nowrap;
                min-width: 0;
            }
            .nav-btn {
                padding: 5px 6px;
                font-size: 0.75rem;
                border-width: 1px;
                border-radius: 6px;
                white-space: nowrap;
            }
            .nav-btn .long-text { display: none; }
            .nav-btn .short-text { display: inline; }
            .delete-btn {
                padding: 4px 8px;
                font-size: 0.75rem;
            }
            .delete-btn .long-text { display: none; }
            .delete-btn .short-text { display: inline; }
            .header-play-btn {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }
            .created-time {
                flex-wrap: wrap;
                gap: 6px;
            }
            .key-word {
                min-width: 100px;
            }
            .arrow-nav {
                position: fixed;
                bottom: 30px;
                top: auto;
                transform: none;
                z-index: 100;
            }
            .arrow-left {
                left: 30px;
            }
            .arrow-right {
                right: 30px;
            }
            .arrow-label {
                display: none;
            }
            body {
                padding-bottom: 100px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                padding-bottom: 80px;
            }
            .content {
                padding: 15px 10px;
            }
            .section {
                padding: 12px 10px;
            }
            .sentence-original {
                font-size: 0.95rem;
            }
            .translation {
                font-size: 0.95rem;
            }
            .key-word {
                min-width: 80px;
                font-size: 0.95rem;
            }
            .key-word-meaning {
                font-size: 0.95rem;
            }
            .created-time {
                font-size: 0.8rem;
            }
            .study-summary {
                gap: 10px;
            }
            .study-stat {
                padding: 8px;
            }
            .study-stat-value {
                font-size: 1.1rem;
            }
            .arrow-btn {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            .arrow-left {
                left: 15px;
            }
            .arrow-right {
                right: 15px;
            }
            .arrow-nav {
                bottom: 20px;
            }
            .image-upload-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .image-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
        }

        /* 图片模块样式 */
        .images-section {
            margin-top: 20px;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #f0f0f0;
        }

        .images-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .images-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #555;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .images-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .image-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .image-upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .image-upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .image-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .image-item:hover {
            transform: scale(1.02);
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .image-item:hover .image-item-overlay {
            opacity: 1;
        }

        .image-item-note {
            color: white;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .image-item-delete {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .image-item:hover .image-item-delete {
            opacity: 1;
        }

        .image-empty {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 0.9rem;
        }

        /* 内嵌图片模块样式 */
        .images-section-inline {
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .image-grid-inline {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .image-grid-inline .image-item {
            width: 100%;
            aspect-ratio: auto;
            max-height: none;
        }

        .image-grid-inline .image-item img {
            width: 100%;
            height: auto;
            object-fit: contain;
            background: #f5f5f5;
            border-radius: 8px;
        }

        /* Lightbox 样式 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 1001;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .lightbox-image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 60px 20px 120px;
            overflow: hidden;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
            transform: scale(2);
            transition: transform 0.3s ease;
            cursor: grab;
        }

        .lightbox-image:active {
            cursor: grabbing;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        .lightbox-nav.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .lightbox-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            padding: 30px 20px 20px;
        }

        .lightbox-note {
            color: white;
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .lightbox-note:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .lightbox-note.empty {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        .lightbox-note-input {
            width: 100%;
            max-width: 500px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        .lightbox-note-input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.15);
        }

        .lightbox-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 8px;
        }

        /* 上传进度 */
        .upload-progress {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: #f8f7ff;
            border-radius: 8px;
            text-align: center;
            color: #667eea;
            font-size: 0.9rem;
        }

        .upload-progress.active {
            display: block;
        }

        .image-upload-input {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 左右切换箭头 -->
    <div class="arrow-nav arrow-left" id="arrowLeft">
        <a href="#" class="arrow-btn disabled" id="prevBtn">←</a>
        <span class="arrow-label" id="prevLabel"></span>
    </div>
    <div class="arrow-nav arrow-right" id="arrowRight">
        <a href="#" class="arrow-btn disabled" id="nextBtn">→</a>
        <span class="arrow-label" id="nextLabel"></span>
    </div>

    <div class="container">
        <div class="header">
            <button class="play-btn header-play-btn" id="headerPlayBtn" onclick="playAudio(dirName, this)" title="播放发音" style="display:none;">▶</button>
            <div class="nav-btns">
                <a id="reviewLink" href="#" class="nav-btn"><span class="long-text">📖 精读</span><span class="short-text">📖精读</span></a>
                <a href="/words" class="nav-btn"><span class="long-text">📖 单词列表</span><span class="short-text">单词</span></a>
                <a href="/sentences" class="nav-btn"><span class="long-text">📝 句子列表</span><span class="short-text">句子</span></a>
                <a href="/" class="nav-btn"><span class="long-text">🔍 查询</span><span class="short-text">🔍</span></a>
                <button class="delete-btn" id="deleteBtn" onclick="deleteSentence()" title="删除句子" style="display:none;"><span class="long-text">🗑️ 删除</span><span class="short-text">🗑️</span></button>
            </div>
        </div>

        <div id="loading" class="loading">加载中</div>

        <div id="content" class="content" style="display:none;"></div>

        <!-- 隐藏的文件输入 -->
        <input type="file" id="imageInput" class="image-upload-input" accept="image/*" multiple onchange="handleImageUpload(this.files)">

        <!-- 上传进度提示 -->
        <div id="uploadProgress" class="upload-progress">上传中...</div>

        <div id="error" class="error" style="display:none;"></div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <button class="lightbox-nav lightbox-prev" onclick="navigateLightbox(-1, event)">←</button>
        <button class="lightbox-nav lightbox-next" onclick="navigateLightbox(1, event)">→</button>
        <div class="lightbox-image-container">
            <img id="lightboxImage" class="lightbox-image" src="" alt="">
        </div>
        <div class="lightbox-footer">
            <div id="lightboxNote" class="lightbox-note" onclick="editLightboxNote()"></div>
            <div id="lightboxInfo" class="lightbox-info"></div>
        </div>
    </div>

    <script>
        const dirName = "{{ dir_name }}";
        let sentencesList = [];
        let currentIndex = -1;

        // 设置精读链接
        document.getElementById('reviewLink').href = `/review/${dirName}`;

        document.getElementById('title').textContent = `句子详情`;

        // 单词高亮相关
        let existingWords = new Set();
        let longWordsSorted = []; // 长度>3的单词，按长度降序排列，用于子串匹配
        async function loadExistingWords() {
            try {
                const res = await fetch('/api/words/exists');
                const data = await res.json();
                if (data.status === 'ok') {
                    existingWords = new Set(data.data);
                    // 预处理：筛选长度>3的单词，按长度降序排列
                    longWordsSorted = data.data.filter(w => w.length > 3).sort((a, b) => b.length - a.length);
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }
        loadExistingWords();

        function highlightWords(text) {
            if (!existingWords.size) return text;
            return text.replace(/\b([a-zA-Z]+)\b/g, (match, word) => {
                const lower = word.toLowerCase();
                // 精确匹配优先
                if (existingWords.has(lower)) {
                    return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${lower}'">${match}</span>`;
                }
                // 包含匹配：从最长的单词开始匹配，首个命中即为最佳
                for (const ew of longWordsSorted) {
                    if (lower.includes(ew)) {
                        return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${ew}'">${match}</span>`;
                    }
                }
                return match;
            });
        }

        // 加载句子列表并初始化导航
        async function initNavigation() {
            try {
                const response = await fetch('/api/sentences');
                const data = await response.json();
                if (data.status === 'ok') {
                    sentencesList = data.data;
                    currentIndex = sentencesList.findIndex(s => s.dir_name === dirName);
                    updateArrowButtons();
                }
            } catch (err) {
                console.error('加载句子列表失败:', err);
            }
        }

        // 更新箭头按钮状态
        function updateArrowButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevLabel = document.getElementById('prevLabel');
            const nextLabel = document.getElementById('nextLabel');

            if (currentIndex > 0) {
                prevBtn.classList.remove('disabled');
                prevBtn.href = `/sentence/${sentencesList[currentIndex - 1].dir_name}`;
                prevLabel.textContent = sentencesList[currentIndex - 1].original.substring(0, 30) + '...';
            } else {
                prevBtn.classList.add('disabled');
                prevLabel.textContent = '';
            }

            if (currentIndex < sentencesList.length - 1) {
                nextBtn.classList.remove('disabled');
                nextBtn.href = `/sentence/${sentencesList[currentIndex + 1].dir_name}`;
                nextLabel.textContent = sentencesList[currentIndex + 1].original.substring(0, 30) + '...';
            } else {
                nextBtn.classList.add('disabled');
                nextLabel.textContent = '';
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                window.location.href = `/sentence/${sentencesList[currentIndex - 1].dir_name}`;
            } else if (e.key === 'ArrowRight' && currentIndex < sentencesList.length - 1) {
                window.location.href = `/sentence/${sentencesList[currentIndex + 1].dir_name}`;
            }
        });

        async function loadSentence() {
            try {
                const response = await fetch(`/api/sentence/${encodeURIComponent(dirName)}`);
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data.status === 'ok') {
                    renderSentence(data.data);
                } else {
                    showError(data.message || '查询失败');
                }
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                showError('网络错误，请重试');
            }
        }

        function renderSentence(data) {
            const audioKey = encodeURIComponent(dirName);

            // 显示顶部播放按钮和删除按钮
            document.getElementById('headerPlayBtn').style.display = 'inline-flex';
            document.getElementById('deleteBtn').style.display = 'inline-block';

            let html = `
                <div class="sentence-header">
                    <div class="sentence-original">${highlightWords(data.original)}</div>
                </div>
            `;

            // 图片模块（紧跟句子之后）
            html += `
                <div id="imagesSectionInline" class="images-section-inline" style="display:none;">
                    <div class="images-header">
                        <div class="images-title">📷 现场记录</div>
                        <button class="image-upload-btn" onclick="document.getElementById('imageInput').click()">
                            <span>+</span> 上传
                        </button>
                    </div>
                    <div id="imageGridInline" class="image-grid-inline"></div>
                </div>
            `;

            // 翻译
            if (data.translation) {
                html += `
                    <div class="section">
                        <div class="section-title">翻译</div>
                        <div class="translation">${data.translation}</div>
                    </div>
                `;
            }

            // 重点单词
            if (data.key_words && data.key_words.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">重点单词</div>
                        ${data.key_words.map(kw => `
                            <div class="key-word-item">
                                <span class="key-word">${kw.word}</span>
                                <span class="key-word-meaning">${kw.meaning}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // Tags + 添加时间（同一行）
            const tags = data.tags || [];
            const tagsHtml = tags.map(t => `
                <span class="tag">
                    ${t}
                    <button class="tag-delete" onclick="deleteTag('${t.replace(/'/g, "\\'")}', this)" title="删除 tag">×</button>
                </span>
            `).join('');
            html += `
                <div class="created-time">
                    <div class="sentence-tags">
                        ${tagsHtml}
                        <button class="tag-add-btn" onclick="showTagInput(this)" title="添加 tag">+</button>
                    </div>
                    <span>📅 添加于 ${data.created_at_str || ''}</span>
                </div>
            `;

            // 学习详情
            const study = data.study || {};
            const totalCount = study.total_count || 0;
            const totalDuration = study.total_duration || 0;
            const records = study.records || [];
            if (totalCount > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">学习详情</div>
                        <div class="study-summary">
                            <div class="study-stat">
                                <div class="study-stat-value">${totalCount}</div>
                                <div class="study-stat-label">总学习次数</div>
                            </div>
                            <div class="study-stat">
                                <div class="study-stat-value">${formatDuration(totalDuration)}</div>
                                <div class="study-stat-label">总学习时长</div>
                            </div>
                        </div>
                        ${records.length > 0 ? `
                            <div style="font-size:0.85rem;color:#999;margin-bottom:8px;">最近学习记录</div>
                            ${records.map(r => `
                                <div class="study-record">
                                    <span>📅 ${r.at_str}</span>
                                    <span>⏱ ${formatDuration(r.duration)}</span>
                                </div>
                            `).join('')}
                        ` : ''}
                    </div>
                `;
            }

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').style.display = 'block';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Tag 管理
        function showTagInput(btn) {
            if (btn.parentElement.querySelector('.tag-input-wrapper')) return;

            const wrapper = document.createElement('span');
            wrapper.className = 'tag-input-wrapper';
            wrapper.innerHTML = `<input class="tag-input" type="text" placeholder="输入 tag" />`;

            btn.parentElement.insertBefore(wrapper, btn);
            const input = wrapper.querySelector('.tag-input');
            input.focus();

            input.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const tag = input.value.trim();
                    if (tag) {
                        await addTag(tag, btn);
                    }
                    wrapper.remove();
                } else if (e.key === 'Escape') {
                    wrapper.remove();
                }
            });

            input.addEventListener('blur', () => {
                setTimeout(() => wrapper.remove(), 150);
            });
        }

        async function addTag(tag, btn) {
            try {
                const res = await fetch(`/api/sentence/${encodeURIComponent(dirName)}/tag`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tag })
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    const tagSpan = document.createElement('span');
                    tagSpan.className = 'tag';
                    tagSpan.innerHTML = `
                        ${tag}
                        <button class="tag-delete" onclick="deleteTag('${tag.replace(/'/g, "\\'")}', this)" title="删除 tag">×</button>
                    `;
                    btn.parentElement.insertBefore(tagSpan, btn);
                }
            } catch (err) {
                console.error('添加 tag 失败:', err);
            }
        }

        async function deleteTag(tag, btn) {
            try {
                const res = await fetch(`/api/sentence/${encodeURIComponent(dirName)}/tag/${encodeURIComponent(tag)}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    btn.parentElement.remove();
                }
            } catch (err) {
                console.error('删除 tag 失败:', err);
            }
        }

        async function deleteSentence() {
            if (!confirm('确定要删除这个句子吗？')) return;

            try {
                const res = await fetch(`/api/sentence/${encodeURIComponent(dirName)}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    // 跳转到句子列表页
                    window.location.href = '/sentences';
                } else {
                    alert('删除失败: ' + (data.message || '未知错误'));
                }
            } catch (err) {
                console.error('删除句子失败:', err);
                alert('删除失败，请重试');
            }
        }

        // 播放音频
        let currentAudio = null;
        let currentPlayingBtn = null;
        function playAudio(dirName, btn) {
            // 如果点击的是当前正在播放的按钮，则暂停
            if (currentAudio && currentPlayingBtn === btn && !currentAudio.paused) {
                currentAudio.pause();
                btn.textContent = '▶';
                btn.classList.remove('playing');
                return;
            }

            // 停止之前的音频
            if (currentAudio) {
                currentAudio.pause();
                if (currentPlayingBtn) {
                    currentPlayingBtn.textContent = '▶';
                    currentPlayingBtn.classList.remove('playing');
                }
            }

            const audio = new Audio(`/api/audio/sentence/${dirName}`);
            currentAudio = audio;
            currentPlayingBtn = btn;
            btn.textContent = '⏸';
            btn.classList.add('playing');

            audio.play().catch(err => {
                console.error('播放失败:', err);
                btn.textContent = '▶';
                btn.classList.remove('playing');
            });

            audio.addEventListener('ended', () => {
                btn.textContent = '▶';
                btn.classList.remove('playing');
            });
        }

        // 格式化秒数为可读时长
        function formatDuration(seconds) {
            if (seconds < 60) return `${seconds}秒`;
            if (seconds < 3600) {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return s > 0 ? `${m}分${s}秒` : `${m}分钟`;
            }
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return m > 0 ? `${h}小时${m}分钟` : `${h}小时`;
        }

        // 学习时长跟踪
        let studyStartTime = Date.now();
        let accumulatedMs = 0;
        let isPageVisible = true;

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏，累加当前段时长
                accumulatedMs += Date.now() - studyStartTime;
                isPageVisible = false;
            } else {
                // 页面恢复，重新开始计时
                studyStartTime = Date.now();
                isPageVisible = true;
            }
        });

        function sendStudyRecord() {
            let totalMs = accumulatedMs;
            if (isPageVisible) {
                totalMs += Date.now() - studyStartTime;
            }
            const duration = Math.round(totalMs / 1000);
            if (duration < 1) return;

            const url = `/api/sentence/${encodeURIComponent(dirName)}/study`;
            const body = JSON.stringify({ duration });
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body,
                keepalive: true
            }).catch(() => {});
        }

        window.addEventListener('beforeunload', sendStudyRecord);

        // 初始化
        loadSentence().then(() => {
            loadImages();
        });
        initNavigation();

        // ==================== 图片相关功能 ====================

        let currentImages = [];
        let currentLightboxIndex = -1;

        // 加载图片列表
        async function loadImages() {
            try {
                const response = await fetch(`/api/sentence/${encodeURIComponent(dirName)}`);
                const data = await response.json();

                if (data.status === 'ok' && data.data.images && data.data.images.length > 0) {
                    currentImages = data.data.images;
                    renderImageGrid();
                    const section = document.getElementById('imagesSectionInline');
                    if (section) section.style.display = 'block';
                } else {
                    currentImages = [];
                    renderImageGrid();
                    // 没有图片时也显示模块（显示上传提示）
                    const section = document.getElementById('imagesSectionInline');
                    if (section) section.style.display = 'block';
                }
            } catch (err) {
                console.error('加载图片失败:', err);
            }
        }

        // 渲染图片网格
        function renderImageGrid() {
            const grid = document.getElementById('imageGridInline');
            if (!grid) return;

            if (currentImages.length === 0) {
                grid.innerHTML = '<div class="image-empty">暂无图片，点击上方按钮上传记录</div>';
                return;
            }

            grid.innerHTML = currentImages.map((img, index) => `
                <div class="image-item" onclick="openLightbox(${index})">
                    <img src="/api/sentence/${encodeURIComponent(dirName)}/images/${img.filename}" alt="${img.original_name}" loading="lazy">
                    <div class="image-item-overlay">
                        <div class="image-item-note">${img.note || '点击查看详情'}</div>
                    </div>
                    <button class="image-item-delete" onclick="deleteImage('${img.filename}', event)" title="删除图片">✕</button>
                </div>
            `).join('');
        }

        // 处理图片上传
        async function handleImageUpload(files) {
            if (!files || files.length === 0) return;

            const progress = document.getElementById('uploadProgress');
            const uploadBtn = document.querySelector('.image-upload-btn');

            progress.classList.add('active');
            progress.textContent = '上传中...';
            uploadBtn.disabled = true;

            let successCount = 0;
            let failCount = 0;

            for (const file of files) {
                try {
                    const formData = new FormData();
                    formData.append('image', file);

                    const response = await fetch(`/api/sentence/${encodeURIComponent(dirName)}/images`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    if (data.status === 'ok') {
                        successCount++;
                    } else {
                        failCount++;
                        console.error('上传失败:', data.message);
                    }
                } catch (err) {
                    failCount++;
                    console.error('上传错误:', err);
                }
            }

            progress.textContent = `上传完成：${successCount} 成功，${failCount} 失败`;
            setTimeout(() => {
                progress.classList.remove('active');
            }, 3000);

            uploadBtn.disabled = false;
            document.getElementById('imageInput').value = '';

            // 重新加载图片
            await loadImages();
        }

        // 删除图片
        async function deleteImage(filename, event) {
            event.stopPropagation();

            if (!confirm('确定要删除这张图片吗？')) return;

            try {
                const response = await fetch(`/api/sentence/${encodeURIComponent(dirName)}/images/${filename}`, {
                    method: 'DELETE'
                });

                const data = await response.json();
                if (data.status === 'ok') {
                    await loadImages();
                } else {
                    alert('删除失败: ' + data.message);
                }
            } catch (err) {
                alert('删除失败，请重试');
            }
        }

        // Lightbox 功能
        function openLightbox(index) {
            currentLightboxIndex = index;
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.add('active');
            updateLightboxContent();
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(event) {
            // 如果是键盘事件或关闭按钮，直接关闭
            if (!event || event.type === 'keydown' || event.target.classList.contains('lightbox-close')) {
                const lightbox = document.getElementById('lightbox');
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
                currentLightboxIndex = -1;
                return;
            }

            // 点击图片或导航按钮时不关闭
            if (event.target.classList.contains('lightbox-image') ||
                event.target.classList.contains('lightbox-nav') ||
                event.target.classList.contains('lightbox-note') ||
                event.target.classList.contains('lightbox-note-input') ||
                event.target.closest('.lightbox-footer')) {
                return;
            }

            // 点击其他区域关闭
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            currentLightboxIndex = -1;
        }

        function navigateLightbox(direction, event) {
            event.stopPropagation();

            const newIndex = currentLightboxIndex + direction;
            if (newIndex >= 0 && newIndex < currentImages.length) {
                currentLightboxIndex = newIndex;
                updateLightboxContent();
            }
        }

        function updateLightboxContent() {
            const img = currentImages[currentLightboxIndex];
            const lightboxImage = document.getElementById('lightboxImage');
            const lightboxNote = document.getElementById('lightboxNote');
            const lightboxInfo = document.getElementById('lightboxInfo');
            const prevBtn = document.querySelector('.lightbox-prev');
            const nextBtn = document.querySelector('.lightbox-next');

            // 重置图片变换状态
            resetImageTransform();

            lightboxImage.src = `/api/sentence/${encodeURIComponent(dirName)}/images/${img.filename}`;

            if (img.note) {
                lightboxNote.textContent = img.note;
                lightboxNote.classList.remove('empty');
            } else {
                lightboxNote.textContent = '点击添加备注';
                lightboxNote.classList.add('empty');
            }

            lightboxInfo.textContent = `${currentLightboxIndex + 1} / ${currentImages.length} · ${img.uploaded_at_str}`;

            // 更新导航按钮状态
            prevBtn.classList.toggle('disabled', currentLightboxIndex === 0);
            nextBtn.classList.toggle('disabled', currentLightboxIndex === currentImages.length - 1);
        }

        // 编辑 Lightbox 备注
        function editLightboxNote() {
            const lightboxNote = document.getElementById('lightboxNote');
            const img = currentImages[currentLightboxIndex];
            const currentNote = img.note || '';

            lightboxNote.innerHTML = `
                <input type="text" class="lightbox-note-input" value="${currentNote}" placeholder="输入备注（如：在 XX 文章看到）" id="noteInput">
            `;

            const noteInput = document.getElementById('noteInput');
            noteInput.focus();
            noteInput.select();

            noteInput.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    await saveLightboxNote(noteInput.value);
                } else if (e.key === 'Escape') {
                    updateLightboxContent();
                }
            });

            noteInput.addEventListener('blur', async () => {
                await saveLightboxNote(noteInput.value);
            });
        }

        async function saveLightboxNote(note) {
            const img = currentImages[currentLightboxIndex];

            try {
                const response = await fetch(`/api/sentence/${encodeURIComponent(dirName)}/images/${img.filename}/note`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note: note })
                });

                const data = await response.json();
                if (data.status === 'ok') {
                    // 更新本地数据
                    img.note = note;
                    updateLightboxContent();
                    renderImageGrid();
                }
            } catch (err) {
                console.error('保存备注失败:', err);
                updateLightboxContent();
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;

            if (e.key === 'Escape') {
                closeLightbox();
            } else if (e.key === 'ArrowLeft') {
                navigateLightbox(-1, e);
            } else if (e.key === 'ArrowRight') {
                navigateLightbox(1, e);
            }
        });

        // 图片拖拽功能
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;
        let currentScale = 2;

        function initImageDrag() {
            const image = document.getElementById('lightboxImage');
            if (!image) return;

            // 鼠标拖拽
            image.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                image.style.cursor = 'grabbing';
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                updateImageTransform();
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
                const image = document.getElementById('lightboxImage');
                if (image) image.style.cursor = 'grab';
            });

            // 触摸拖拽
            image.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX - translateX;
                    startY = e.touches[0].clientY - translateY;
                }
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                updateImageTransform();
            }, { passive: true });

            document.addEventListener('touchend', () => {
                isDragging = false;
            });

            // 滚轮缩放
            const container = document.querySelector('.lightbox-image-container');
            if (container) {
                container.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.2 : 0.2;
                    currentScale = Math.max(0.5, Math.min(5, currentScale + delta));
                    updateImageTransform();
                }, { passive: false });
            }
        }

        function updateImageTransform() {
            const image = document.getElementById('lightboxImage');
            if (!image) return;
            image.style.transform = `scale(${currentScale}) translate(${translateX / currentScale}px, ${translateY / currentScale}px)`;
        }

        function resetImageTransform() {
            translateX = 0;
            translateY = 0;
            currentScale = 2;
            updateImageTransform();
        }

        // 初始化拖拽
        initImageDrag();
    </script>
</body>
</html>
