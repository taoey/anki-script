<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/icon.png" type="image/png">
    <title>单词列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .nav-btns {
            display: flex;
            gap: 10px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: white;
            color: #667eea;
        }

        .stats {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .word-list {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .word-item {
            display: flex;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
            gap: 15px;
        }

        .word-item:hover {
            background: #f8f9fa;
        }

        .word-item:last-child {
            border-bottom: none;
        }

        .word-main {
            flex: 1;
        }

        .word-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .word-phonetic {
            color: #667eea;
            font-style: italic;
            font-size: 0.95rem;
        }

        .word-meaning {
            flex: 2;
            color: #666;
            font-size: 1.05rem;
        }

        .word-link {
            color: #e67e22;
            border-bottom: 1px dashed #e67e22;
            cursor: pointer;
            font-weight: 500;
        }

        .word-link:hover {
            color: #d35400;
            border-bottom-color: #d35400;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 10px;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(102, 126, 234, 0); }
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .empty a {
            color: #667eea;
            text-decoration: none;
        }

        @media (max-width: 900px) {
            .header {
                margin-bottom: 15px;
            }
            h1 {
                font-size: 1.3rem;
            }
            .nav-btns {
                gap: 6px;
            }
            .back-btn {
                padding: 6px 10px;
                font-size: 0.8rem;
                border-width: 1px;
                border-radius: 6px;
                white-space: nowrap;
            }
            .stats {
                padding: 10px 15px;
                font-size: 0.95rem;
            }
            .word-item {
                padding: 17px;
            }
            .word-text {
                font-size: 1.2rem;
            }
            .word-meaning {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><a href="/" style="color:inherit;text-decoration:none;"><img src="/static/icon.png" alt="icon" style="width:36px;height:36px;vertical-align:middle;margin-right:8px;">英语助手</a></h1>
            <div class="nav-btns">
                <a href="/sentences" class="back-btn">📝 句子列表</a>
            </div>
        </div>

        <div id="stats" class="stats" style="display:none;"></div>

        <div id="wordList" class="word-list" style="display:none;"></div>

        <div id="empty" class="empty" style="display:none;">
            <p>📭 还没有查询过单词</p>
            <p style="margin-top: 15px;"><a href="/">去查询第一个单词 →</a></p>
        </div>
    </div>

    <script>
        // 单词高亮相关
        let existingWords = new Set();
        async function loadExistingWords() {
            try {
                const res = await fetch('/api/words/exists');
                const data = await res.json();
                if (data.status === 'ok') {
                    existingWords = new Set(data.data);
                }
            } catch (err) {
                console.error('加载单词列表失败:', err);
            }
        }
        loadExistingWords();

        function highlightWords(text) {
            if (!existingWords.size) return text;
            return text.replace(/\b([a-zA-Z]+)\b/g, (match, word) => {
                if (existingWords.has(word.toLowerCase())) {
                    return `<span class="word-link" onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/word/${word.toLowerCase()}'">${match}</span>`;
                }
                return match;
            });
        }

        async function loadWords() {
            try {
                const response = await fetch('/api/words');
                const data = await response.json();

                if (data.status === 'ok' && data.data.length > 0) {
                    renderWords(data.data);
                } else {
                    document.getElementById('empty').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('empty').style.display = 'block';
            }
        }

        function renderWords(words) {
            // 显示统计
            const statsDiv = document.getElementById('stats');
            statsDiv.textContent = `共收录 ${words.length} 个单词`;
            statsDiv.style.display = 'block';

            // 渲染列表
            const listDiv = document.getElementById('wordList');
            listDiv.innerHTML = words.map(w => {
                const audioKey = encodeURIComponent(w.dir_name || w.word);
                return `
                <a href="/word/${w.dir_name || w.word}" class="word-item">
                    <div class="word-main">
                        <div class="word-text">${w.word}</div>
                        <div class="word-phonetic">${w.phonetic || ''}</div>
                    </div>
                    <div class="word-meaning">${highlightWords(w.meaning || '')}</div>
                    <button class="play-btn" onclick="event.preventDefault(); event.stopPropagation(); playAudio('${audioKey}', this)" title="播放发音">▶</button>
                </a>
            `}).join('');

            listDiv.style.display = 'block';
        }

        loadWords();

        // 播放音频
        let currentAudio = null;
        function playAudio(word, btn) {
            if (currentAudio) {
                currentAudio.pause();
                document.querySelectorAll('.play-btn.playing').forEach(b => b.classList.remove('playing'));
            }

            const audio = new Audio(`/api/audio/${encodeURIComponent(word)}`);
            currentAudio = audio;
            btn.classList.add('playing');

            audio.play().catch(err => {
                console.error('播放失败:', err);
                btn.classList.remove('playing');
            });

            audio.addEventListener('ended', () => {
                btn.classList.remove('playing');
            });
        }
    </script>
</body>
</html>
